<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLK-01 — Product Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0908;
      overflow: hidden;
      font-family: 'Geist', system-ui, -apple-system, sans-serif;
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }
    canvas { display: block; cursor: grab; }
    canvas:active { cursor: grabbing; }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%);
    }

    .product-info {
      position: fixed;
      bottom: 40px;
      left: 40px;
      z-index: 10;
    }
    .product-info h1 {
      font-family: 'Geist Mono', 'JetBrains Mono', monospace;
      font-size: 24px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: rgba(255,160,48,0.7);
      margin-bottom: 4px;
    }
    .product-info p {
      font-size: 11px;
      color: rgba(255,160,48,0.3);
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .color-swatches {
      position: fixed;
      bottom: 44px;
      right: 40px;
      display: flex;
      gap: 12px;
      z-index: 10;
    }
    .swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid rgba(255,160,48,0.1);
      cursor: pointer;
      transition: border-color 0.3s, transform 0.2s;
    }
    .swatch:hover { transform: scale(1.2); }
    .swatch.active { border-color: rgba(255,160,48,0.6); }
    .swatch:focus-visible {
      outline: 2px solid rgba(255,160,48,0.7);
      outline-offset: 2px;
    }

    @media (max-width: 768px) {
      .product-info { bottom: 24px; left: 24px; }
      .product-info h1 { font-size: 18px; }
      .color-swatches { bottom: 28px; right: 24px; gap: 10px; }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="vignette"></div>

  <div class="product-info">
    <h1>CLK-01</h1>
    <p>Meridian Systems</p>
  </div>

  <div class="color-swatches">
    <button class="swatch active" data-color="#ff7b2e" style="background:#ff7b2e" aria-label="Signal Orange"></button>
    <button class="swatch" data-color="#e8ddd0" style="background:#e8ddd0" aria-label="Bone"></button>
    <button class="swatch" data-color="#3a3a42" style="background:#3a3a42" aria-label="Slate"></button>
    <button class="swatch" data-color="#6a8050" style="background:#6a8050" aria-label="Field"></button>
    <button class="swatch" data-color="#cc3030" style="background:#cc3030" aria-label="Alert"></button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

    // ── Renderer ───────────────────────────────
    const canvas = document.getElementById('c');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    // ── Scene ──────────────────────────────────
    const scene = new THREE.Scene();

    // Warm dark gradient background
    const bgCv = document.createElement('canvas');
    bgCv.width = 2; bgCv.height = 512;
    const bgCtx = bgCv.getContext('2d');
    const bgGrad = bgCtx.createLinearGradient(0, 0, 0, 512);
    bgGrad.addColorStop(0, '#16120e');
    bgGrad.addColorStop(0.5, '#0c0a08');
    bgGrad.addColorStop(1, '#080706');
    bgCtx.fillStyle = bgGrad;
    bgCtx.fillRect(0, 0, 2, 512);
    scene.background = new THREE.CanvasTexture(bgCv);

    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
    pmrem.dispose();

    // ── Camera & Controls ──────────────────────
    const camera = new THREE.PerspectiveCamera(30, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(4, 2, 6);

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 0.2, 0);
    controls.minDistance = 3;
    controls.maxDistance = 12;
    controls.maxPolarAngle = Math.PI * 0.85;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.4;

    // ── Post-processing (dreamy bloom) ─────────
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloom = new UnrealBloomPass(
      new THREE.Vector2(innerWidth, innerHeight),
      0.5, 0.8, 0.7
    );
    composer.addPass(bloom);
    composer.addPass(new OutputPass());

    // ── Materials ──────────────────────────────

    // Glass shell (Frutiger Aero + TE orange)
    const bodyMat = new THREE.MeshPhysicalMaterial({
      color: 0xff7b2e,
      roughness: 0.05,
      metalness: 0.0,
      transmission: 0.6,
      thickness: 1.5,
      ior: 1.33,
      clearcoat: 0.5,
      clearcoatRoughness: 0.03,
    });

    const chromeMat = new THREE.MeshStandardMaterial({
      color: 0xeeeeee,
      roughness: 0.03,
      metalness: 0.99,
      emissive: 0xffffff,
      emissiveIntensity: 0.15,
    });

    const screenFrameMat = new THREE.MeshStandardMaterial({
      color: 0x080604,
      roughness: 0.92,
      metalness: 0.05,
      side: THREE.DoubleSide,
    });

    // Amber glowing hands
    const handMat = new THREE.MeshStandardMaterial({
      color: 0xdd7020,
      roughness: 0.3,
      metalness: 0.4,
      emissive: 0xff9030,
      emissiveIntensity: 0.6,
      transparent: true,
    });

    const secondHandMat = new THREE.MeshStandardMaterial({
      color: 0xffaa44,
      roughness: 0.3,
      metalness: 0.3,
      emissive: 0xffbb55,
      emissiveIntensity: 0.8,
      transparent: true,
    });

    const darkMetalMat = new THREE.MeshStandardMaterial({
      color: 0x1a1a1a,
      roughness: 0.3,
      metalness: 0.7,
    });

    // TE orange button
    const buttonMat = new THREE.MeshStandardMaterial({
      color: 0xff7b2e,
      roughness: 0.3,
      metalness: 0.1,
      emissive: 0xff6020,
      emissiveIntensity: 0.1,
    });

    // ── Product Group ──────────────────────────
    const product = new THREE.Group();
    scene.add(product);

    // ── Body (translucent glass shell) ─────────
    const body = new THREE.Mesh(
      new RoundedBoxGeometry(2.4, 3.0, 2.0, 8, 0.55),
      bodyMat
    );
    product.add(body);

    // ── Handle ─────────────────────────────────
    const handle = new THREE.Mesh(
      new THREE.TorusGeometry(0.35, 0.05, 16, 32, Math.PI),
      bodyMat
    );
    handle.rotation.x = -Math.PI / 2;
    handle.position.set(0, 1.48, 0);
    product.add(handle);

    // ── Internals (visible through glass) ──────
    const boardMat = new THREE.MeshStandardMaterial({
      color: 0x1a7a3a, roughness: 0.7, metalness: 0.1, side: THREE.DoubleSide,
    });
    const board = new THREE.Mesh(new THREE.BoxGeometry(1.4, 2.0, 0.03), boardMat);
    board.position.z = 0.2;
    product.add(board);

    // Chip
    const chip = new THREE.Mesh(
      new THREE.BoxGeometry(0.35, 0.35, 0.05),
      new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.4, metalness: 0.5 })
    );
    chip.position.set(0, 0.5, 0.245);
    product.add(chip);

    // Capacitors
    const capColors = [0x2244cc, 0xcc8822, 0xcc2244];
    for (let i = 0; i < 3; i++) {
      const cap = new THREE.Mesh(
        new THREE.CylinderGeometry(0.025, 0.025, 0.1, 8),
        new THREE.MeshStandardMaterial({ color: capColors[i], roughness: 0.4, metalness: 0.3 })
      );
      cap.rotation.x = Math.PI / 2;
      cap.position.set(-0.3 + i * 0.2, -0.6, 0.27);
      product.add(cap);
    }

    // Board LED
    const boardLed = new THREE.Mesh(
      new THREE.SphereGeometry(0.02, 8, 8),
      new THREE.MeshStandardMaterial({ color: 0xff8020, emissive: 0xff8020, emissiveIntensity: 1.0 })
    );
    boardLed.position.set(0.45, 0.5, 0.27);
    product.add(boardLed);

    // ── Screen Frame ───────────────────────────
    function roundedRect(w, h, r) {
      const s = new THREE.Shape();
      const hw = w / 2, hh = h / 2;
      s.moveTo(-hw + r, -hh);
      s.lineTo(hw - r, -hh);
      s.quadraticCurveTo(hw, -hh, hw, -hh + r);
      s.lineTo(hw, hh - r);
      s.quadraticCurveTo(hw, hh, hw - r, hh);
      s.lineTo(-hw + r, hh);
      s.quadraticCurveTo(-hw, hh, -hw, hh - r);
      s.lineTo(-hw, -hh + r);
      s.quadraticCurveTo(-hw, -hh, -hw + r, -hh);
      return s;
    }

    const screenFrame = new THREE.Mesh(
      new THREE.ShapeGeometry(roundedRect(1.9, 1.9, 0.18)),
      screenFrameMat
    );
    screenFrame.position.set(0, 0.3, 1.003);
    product.add(screenFrame);

    // ── Clock Face (amber phosphor CRT) ────────
    const CLOCK_R = 0.72;
    const CLOCK_Z = 1.008;

    function createClockTexture() {
      const s = 1024;
      const cv = document.createElement('canvas');
      cv.width = s; cv.height = s;
      const ctx = cv.getContext('2d');

      // Dark warm CRT background
      ctx.fillStyle = '#0a0805';
      ctx.beginPath();
      ctx.arc(s / 2, s / 2, s / 2 - 2, 0, Math.PI * 2);
      ctx.fill();

      // Scanlines
      ctx.strokeStyle = 'rgba(255,144,48,0.02)';
      ctx.lineWidth = 1;
      for (let y = 0; y < s; y += 4) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(s, y);
        ctx.stroke();
      }

      // Inner ring
      ctx.strokeStyle = 'rgba(255,144,48,0.08)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(s / 2, s / 2, s * 0.46, 0, Math.PI * 2);
      ctx.stroke();

      // Tick marks
      for (let i = 0; i < 60; i++) {
        const a = (i / 60) * Math.PI * 2 - Math.PI / 2;
        const hour = i % 5 === 0;
        const r0 = s * (hour ? 0.38 : 0.42);
        const r1 = s * 0.46;
        ctx.strokeStyle = hour ? '#ff9030' : 'rgba(255,144,48,0.2)';
        ctx.lineWidth = hour ? 4 : 1.5;
        ctx.beginPath();
        ctx.moveTo(s / 2 + Math.cos(a) * r0, s / 2 + Math.sin(a) * r0);
        ctx.lineTo(s / 2 + Math.cos(a) * r1, s / 2 + Math.sin(a) * r1);
        ctx.stroke();
      }

      // Numbers
      ctx.fillStyle = '#ff9030';
      ctx.font = '600 48px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (let i = 1; i <= 12; i++) {
        const a = (i / 12) * Math.PI * 2 - Math.PI / 2;
        const r = s * 0.32;
        ctx.fillText(String(i), s / 2 + Math.cos(a) * r, s / 2 + Math.sin(a) * r);
      }

      return new THREE.CanvasTexture(cv);
    }

    const clockFaceMat = new THREE.MeshStandardMaterial({
      map: createClockTexture(),
      roughness: 0.3,
      metalness: 0.0,
      emissive: 0xff9030,
      emissiveIntensity: 0.4,
    });

    const clockFace = new THREE.Mesh(
      new THREE.CircleGeometry(CLOCK_R, 64),
      clockFaceMat
    );
    clockFace.position.set(0, 0.3, CLOCK_Z);
    product.add(clockFace);

    // Glass (amber CRT tint)
    const glass = new THREE.Mesh(
      new THREE.CircleGeometry(CLOCK_R - 0.01, 64),
      new THREE.MeshPhysicalMaterial({
        transparent: true,
        opacity: 0.06,
        roughness: 0.0,
        metalness: 0.1,
        clearcoat: 1.0,
        clearcoatRoughness: 0.05,
        color: 0x221100,
      })
    );
    glass.position.set(0, 0.3, 1.05);
    product.add(glass);

    // Chrome bezel
    const bezel = new THREE.Mesh(
      new THREE.TorusGeometry(CLOCK_R + 0.01, 0.035, 24, 64),
      chromeMat
    );
    bezel.position.set(0, 0.3, 1.01);
    product.add(bezel);

    // ── Clock Hands ────────────────────────────
    function makeHand(w, len, thick, mat) {
      const g = new THREE.BoxGeometry(w, len, thick);
      g.translate(0, len / 2, 0);
      const m = new THREE.Mesh(g, mat);
      m.position.set(0, 0.3, CLOCK_Z + 0.012);
      return m;
    }

    const hourHand = makeHand(0.04, 0.3, 0.012, handMat);
    const minuteHand = makeHand(0.028, 0.45, 0.01, handMat);

    const secGeo = new THREE.BoxGeometry(0.012, 0.52, 0.006);
    secGeo.translate(0, 0.17, 0);
    const secondHand = new THREE.Mesh(secGeo, secondHandMat);
    secondHand.position.set(0, 0.3, CLOCK_Z + 0.017);

    product.add(hourHand, minuteHand, secondHand);

    // Center cap
    const capGeo = new THREE.CylinderGeometry(0.025, 0.025, 0.012, 16);
    capGeo.rotateX(Math.PI / 2);
    const cap = new THREE.Mesh(capGeo, chromeMat);
    cap.position.set(0, 0.3, CLOCK_Z + 0.022);
    product.add(cap);

    // ── Corner Bolts (TE industrial detail) ────
    const boltGeo = new THREE.CylinderGeometry(0.022, 0.022, 0.015, 6);
    boltGeo.rotateX(Math.PI / 2);
    const boltMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.2, metalness: 0.8 });
    for (const [x, y] of [[-0.86, 1.12], [0.86, 1.12], [-0.86, -0.52], [0.86, -0.52]]) {
      const bolt = new THREE.Mesh(boltGeo, boltMat);
      bolt.position.set(x, y, 1.004);
      product.add(bolt);
    }

    // ── Power LED (chin) ───────────────────────
    const powerLedMat = new THREE.MeshStandardMaterial({
      color: 0xff8020, emissive: 0xff8020, emissiveIntensity: 0.8,
    });
    const powerLed = new THREE.Mesh(new THREE.CircleGeometry(0.018, 12), powerLedMat);
    powerLed.position.set(0.5, -0.65, 1.004);
    product.add(powerLed);

    // ── Brand Mark (chin) ──────────────────────
    function createBrandTexture() {
      const cv = document.createElement('canvas');
      cv.width = 512; cv.height = 64;
      const ctx = cv.getContext('2d');
      ctx.fillStyle = 'rgba(255,144,48,0.3)';
      ctx.font = '500 24px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('CLK-01', 256, 20);
      ctx.fillStyle = 'rgba(255,144,48,0.12)';
      ctx.font = '300 13px "Courier New", monospace';
      ctx.fillText('MERIDIAN SYSTEMS', 256, 48);
      return new THREE.CanvasTexture(cv);
    }

    const brandMark = new THREE.Mesh(
      new THREE.PlaneGeometry(1.0, 0.2),
      new THREE.MeshBasicMaterial({ map: createBrandTexture(), transparent: true, depthWrite: false })
    );
    brandMark.position.set(0, -0.72, 1.004);
    product.add(brandMark);

    // ── Button ─────────────────────────────────
    const btnBase = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.05, 0.07, 24),
      darkMetalMat
    );
    btnBase.position.set(-0.6, 1.53, 0);
    product.add(btnBase);

    const button = new THREE.Mesh(
      new THREE.CylinderGeometry(0.065, 0.07, 0.06, 24),
      buttonMat
    );
    const BTN_Y = 1.57;
    button.position.set(-0.6, BTN_Y, 0);
    button.castShadow = true;
    product.add(button);

    // ── Base (warm cream, TE-style) ────────────
    const base = new THREE.Mesh(
      new RoundedBoxGeometry(2.0, 0.08, 1.4, 4, 0.04),
      new THREE.MeshPhysicalMaterial({
        color: 0xf0e8d8, roughness: 0.3, metalness: 0.0, clearcoat: 0.3,
      })
    );
    base.position.set(0, -1.54, 0);
    base.castShadow = true;
    base.receiveShadow = true;
    product.add(base);

    // ── Inner Glow (amber) ─────────────────────
    const innerGlow = new THREE.PointLight(0xff8020, 0, 3);
    innerGlow.position.set(0, 0.3, 0.5);
    product.add(innerGlow);

    // ── Floating Bubbles (Frutiger Aero) ───────
    const bubbles = [];
    const bubbleMat = new THREE.MeshPhysicalMaterial({
      color: 0xffbb55,
      roughness: 0.0,
      metalness: 0.0,
      transmission: 0.92,
      thickness: 0.3,
      ior: 1.33,
      clearcoat: 1.0,
      clearcoatRoughness: 0.0,
    });

    for (let i = 0; i < 7; i++) {
      const r = 0.04 + Math.random() * 0.1;
      const bubble = new THREE.Mesh(new THREE.SphereGeometry(r, 16, 16), bubbleMat);
      bubble.userData = {
        angle: (i / 7) * Math.PI * 2,
        dist: 2.2 + Math.random() * 1.3,
        baseY: -1.0 + Math.random() * 2.5,
        speed: 0.08 + Math.random() * 0.15,
        bobSpeed: 0.4 + Math.random() * 0.8,
      };
      scene.add(bubble);
      bubbles.push(bubble);
    }

    // ── Lighting (warm, industrial) ────────────
    const key = new THREE.DirectionalLight(0xfff0d0, 2.5);
    key.position.set(4, 5, 6);
    key.castShadow = true;
    key.shadow.mapSize.set(2048, 2048);
    key.shadow.camera.near = 0.1;
    key.shadow.camera.far = 20;
    key.shadow.camera.left = -4;
    key.shadow.camera.right = 4;
    key.shadow.camera.top = 4;
    key.shadow.camera.bottom = -4;
    key.shadow.radius = 4;
    key.shadow.bias = -0.0005;
    scene.add(key);

    const fill = new THREE.DirectionalLight(0xb0c8e0, 0.5);
    fill.position.set(-4, 3, 2);
    scene.add(fill);

    const rim = new THREE.DirectionalLight(0xffcc88, 1.0);
    rim.position.set(0, 2, -5);
    scene.add(rim);

    scene.add(new THREE.HemisphereLight(0x332210, 0x0a0808, 0.6));
    scene.add(new THREE.AmbientLight(0x201510, 0.4));

    // ── Ground ─────────────────────────────────
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 30),
      new THREE.MeshStandardMaterial({ color: 0x0c0a08, roughness: 0.2, metalness: 0.05 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1.58;
    ground.receiveShadow = true;
    scene.add(ground);

    // Contact shadow
    function createContactShadow() {
      const s = 256;
      const cv = document.createElement('canvas');
      cv.width = s; cv.height = s;
      const ctx = cv.getContext('2d');
      const g = ctx.createRadialGradient(s / 2, s / 2, 0, s / 2, s / 2, s / 2);
      g.addColorStop(0, 'rgba(0,0,0,0.3)');
      g.addColorStop(0.6, 'rgba(0,0,0,0.1)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, s, s);
      return new THREE.CanvasTexture(cv);
    }

    const contactShadow = new THREE.Mesh(
      new THREE.PlaneGeometry(3.5, 2.5),
      new THREE.MeshBasicMaterial({ map: createContactShadow(), transparent: true, depthWrite: false })
    );
    contactShadow.rotation.x = -Math.PI / 2;
    contactShadow.position.y = -1.575;
    scene.add(contactShadow);

    // ── Interactions ───────────────────────────
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    let targetColor = new THREE.Color(0xff7b2e);

    let clockOn = true;
    let flashTime = 0;
    const FLASH_DURATION = 600;
    let targetClockEmissive = 0.4;
    let targetClockColor = new THREE.Color(1, 1, 1);
    let targetHandEmissive = 0.6;
    let targetSecondEmissive = 0.8;
    let targetHandOpacity = 1.0;

    canvas.addEventListener('pointerdown', (e) => {
      pointer.x = (e.clientX / innerWidth) * 2 - 1;
      pointer.y = -(e.clientY / innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      if (raycaster.intersectObject(button).length) {
        button.position.y = BTN_Y - 0.03;
        setTimeout(() => { button.position.y = BTN_Y; }, 120);

        clockOn = !clockOn;
        flashTime = Date.now();
        if (clockOn) {
          targetClockEmissive = 0.4;
          targetClockColor.set(1, 1, 1);
          targetHandEmissive = 0.6;
          targetSecondEmissive = 0.8;
          targetHandOpacity = 1.0;
        } else {
          targetClockEmissive = 0.0;
          targetClockColor.set(0, 0, 0);
          targetHandEmissive = 0.0;
          targetSecondEmissive = 0.0;
          targetHandOpacity = 0.0;
        }
      }
    });

    canvas.addEventListener('pointermove', (e) => {
      pointer.x = (e.clientX / innerWidth) * 2 - 1;
      pointer.y = -(e.clientY / innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      canvas.style.cursor = raycaster.intersectObject(button).length ? 'pointer' : '';
    });

    document.querySelectorAll('.swatch').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        el.classList.add('active');
        targetColor.set(el.dataset.color);
      });
    });

    // ── Animation Loop ─────────────────────────
    const BASE_BLOOM = 0.5;

    function animate() {
      requestAnimationFrame(animate);

      // Clock hands
      if (clockOn) {
        const now = new Date();
        const s = now.getSeconds() + now.getMilliseconds() / 1000;
        const m = now.getMinutes() + s / 60;
        const h = (now.getHours() % 12) + m / 60;
        secondHand.rotation.z = -(s / 60) * Math.PI * 2;
        minuteHand.rotation.z = -(m / 60) * Math.PI * 2;
        hourHand.rotation.z = -(h / 12) * Math.PI * 2;
      }

      // Clock face transitions
      clockFaceMat.emissiveIntensity += (targetClockEmissive - clockFaceMat.emissiveIntensity) * 0.06;
      clockFaceMat.color.lerp(targetClockColor, 0.06);

      // Hand transitions
      handMat.emissiveIntensity += (targetHandEmissive - handMat.emissiveIntensity) * 0.06;
      handMat.opacity += (targetHandOpacity - handMat.opacity) * 0.08;
      secondHandMat.emissiveIntensity += (targetSecondEmissive - secondHandMat.emissiveIntensity) * 0.06;
      secondHandMat.opacity += (targetHandOpacity - secondHandMat.opacity) * 0.08;

      const handsVisible = handMat.opacity > 0.01;
      hourHand.visible = handsVisible;
      minuteHand.visible = handsVisible;
      secondHand.visible = handsVisible;
      cap.visible = handsVisible;

      // Power LED follows clock state
      powerLedMat.emissiveIntensity += ((clockOn ? 0.8 : 0.0) - powerLedMat.emissiveIntensity) * 0.06;

      // CRT flicker
      if (clockOn && Date.now() - flashTime > FLASH_DURATION) {
        clockFaceMat.emissiveIntensity += (Math.random() - 0.5) * 0.015;
      }

      // Board LED pulse
      boardLed.material.emissiveIntensity = 0.6 + Math.sin(Date.now() * 0.003) * 0.4;

      // Flash on toggle
      const flashElapsed = Date.now() - flashTime;
      if (flashElapsed < FLASH_DURATION) {
        const t = flashElapsed / FLASH_DURATION;
        const pulse = Math.sin(t * Math.PI) * (1 - t * 0.3);
        bloom.strength = BASE_BLOOM + pulse * 2.0;
        clockFaceMat.emissiveIntensity += pulse * 0.9;
        chromeMat.emissiveIntensity = 0.15 + pulse * 0.7;
        innerGlow.intensity = pulse * 5;
      } else {
        bloom.strength += (BASE_BLOOM - bloom.strength) * 0.1;
        chromeMat.emissiveIntensity += (0.15 - chromeMat.emissiveIntensity) * 0.1;
        innerGlow.intensity *= 0.9;
      }

      // Body color
      bodyMat.color.lerp(targetColor, 0.08);

      // Float
      product.position.y = Math.sin(Date.now() * 0.0008) * 0.008;

      // Bubbles orbit
      for (const b of bubbles) {
        b.userData.angle += b.userData.speed * 0.003;
        b.position.x = Math.cos(b.userData.angle) * b.userData.dist;
        b.position.z = Math.sin(b.userData.angle) * b.userData.dist;
        b.position.y = b.userData.baseY + Math.sin(Date.now() * 0.001 * b.userData.bobSpeed) * 0.2;
      }

      controls.update();
      composer.render();
    }
    animate();

    // ── Resize ─────────────────────────────────
    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      composer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
