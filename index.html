<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Device 01</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(180deg, #2a2830 0%, #32303a 50%, #2e2c34 100%);
      overflow: hidden;
      font-family: 'Geist', system-ui, -apple-system, sans-serif;
      color: #333;
      -webkit-font-smoothing: antialiased;
    }
    canvas { display: block; cursor: grab; }
    canvas:active { cursor: grabbing; }

    .vignette {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.3) 100%);
    }

    .product-info {
      position: fixed; bottom: 40px; left: 40px; z-index: 10;
    }
    .product-info h1 {
      font-family: 'Geist Mono', 'JetBrains Mono', monospace;
      font-size: 24px; font-weight: 500; letter-spacing: 0.06em;
      color: rgba(255,255,255,0.7); margin-bottom: 4px;
    }
    .product-info p {
      font-size: 11px; color: rgba(0,0,0,0.35); font-weight: 400;
      letter-spacing: 0.12em; text-transform: uppercase;
    }

    .rain, .rain-2 {
      position: fixed;
      inset: -80px;
      pointer-events: none;
      z-index: 1;
      background-image:
        linear-gradient(178deg, transparent 49%, rgba(180,190,210,0.04) 49.5%, rgba(180,190,210,0.04) 50%, transparent 50.5%);
      background-size: 3px 60px;
      animation: rain-fall 0.35s linear infinite;
    }
    .rain-2 {
      background-size: 5px 90px;
      animation-duration: 0.5s;
      opacity: 0.4;
    }
    @keyframes rain-fall {
      from { transform: translateY(-60px); }
      to { transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .product-info { bottom: 24px; left: 24px; }
      .product-info h1 { font-size: 18px; }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="vignette"></div>

  <div class="rain"></div>
  <div class="rain rain-2"></div>

  <div class="product-info">
    <h1>デバイス 01</h1>
  </div>

  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }}
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    const canvas = document.getElementById('c');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.3;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene = new THREE.Scene();

    // Anime pastel gradient background
    const bgCv = document.createElement('canvas');
    bgCv.width = 2; bgCv.height = 512;
    const bgCtx = bgCv.getContext('2d');
    const bgGrad = bgCtx.createLinearGradient(0, 0, 0, 512);
    bgGrad.addColorStop(0, '#2a2830');
    bgGrad.addColorStop(0.4, '#32303a');
    bgGrad.addColorStop(1, '#2e2c34');
    bgCtx.fillStyle = bgGrad;
    bgCtx.fillRect(0, 0, 2, 512);
    scene.background = new THREE.CanvasTexture(bgCv);

    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
    pmrem.dispose();

    const camera = new THREE.PerspectiveCamera(28, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(5, 3, 7);

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 0, 0);
    controls.minDistance = 4;
    controls.maxDistance = 14;
    controls.maxPolarAngle = Math.PI * 0.85;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.4;

    // ── Materials ──────────────────────────────
    const bodyMat = new THREE.MeshPhysicalMaterial({
      color: 0xb0d0e8,
      roughness: 0.05,
      metalness: 0.0,
      clearcoat: 1.0,
      clearcoatRoughness: 0.02,
      transparent: true,
      opacity: 0.45,
    });

    const chromeMat = new THREE.MeshStandardMaterial({
      color: 0xE5E4E6, roughness: 0.08, metalness: 0.9,
    });

    const dpadMat = new THREE.MeshStandardMaterial({
      color: 0xc0d8e8, roughness: 0.3, metalness: 0.05,
    });

    const smallBtnMat = new THREE.MeshStandardMaterial({
      color: 0xc8dce8, roughness: 0.35, metalness: 0.08,
    });

    // ── Product Group ──────────────────────────
    const product = new THREE.Group();
    scene.add(product);

    // ── Body (landscape handheld) ──────────────
    const body = new THREE.Mesh(
      new RoundedBoxGeometry(5.0, 2.2, 0.5, 6, 0.25),
      bodyMat
    );
    body.castShadow = true;
    product.add(body);

    // ── Cel outline (anime edge) ────────────────
    const outline = new THREE.Mesh(
      new RoundedBoxGeometry(5.0, 2.2, 0.5, 6, 0.25),
      new THREE.MeshBasicMaterial({ color: 0x18141e, side: THREE.BackSide })
    );
    outline.scale.multiplyScalar(1.025);
    product.add(outline);

    // ── Internals (visible through transparent shell) ──
    const board = new THREE.Mesh(
      new THREE.BoxGeometry(3.5, 1.5, 0.02),
      new THREE.MeshStandardMaterial({ color: 0x1a7a3a, roughness: 0.7, metalness: 0.1, side: THREE.DoubleSide })
    );
    product.add(board);
    for (const [x, y, bw, bh] of [[0.6,0.1,0.4,0.4], [-0.4,0.3,0.22,0.15], [-0.4,-0.15,0.22,0.15]]) {
      const c = new THREE.Mesh(
        new THREE.BoxGeometry(bw, bh, 0.035),
        new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.4, metalness: 0.5 })
      );
      c.position.set(x, y, 0.025);
      product.add(c);
    }

    // ── Screen ─────────────────────────────────
    function roundedRect(w, h, r) {
      const s = new THREE.Shape();
      const hw = w / 2, hh = h / 2;
      s.moveTo(-hw + r, -hh); s.lineTo(hw - r, -hh);
      s.quadraticCurveTo(hw, -hh, hw, -hh + r); s.lineTo(hw, hh - r);
      s.quadraticCurveTo(hw, hh, hw - r, hh); s.lineTo(-hw + r, hh);
      s.quadraticCurveTo(-hw, hh, -hw, hh - r); s.lineTo(-hw, -hh + r);
      s.quadraticCurveTo(-hw, -hh, -hw + r, -hh);
      return s;
    }

    // Screen bezel
    const screenBezel = new THREE.Mesh(
      new THREE.ShapeGeometry(roundedRect(3.1, 1.55, 0.1)),
      new THREE.MeshStandardMaterial({ color: 0x1a1816, roughness: 0.88, metalness: 0.05 })
    );
    screenBezel.position.set(0, 0.05, 0.253);
    product.add(screenBezel);

    // Screen display — Ghibli landscape
    function createScreenTexture() {
      const w = 1024, h = 512;
      const cv = document.createElement('canvas');
      cv.width = w; cv.height = h;
      const ctx = cv.getContext('2d');

      // Soft blue sky
      const sky = ctx.createLinearGradient(0, 0, 0, h * 0.6);
      sky.addColorStop(0, '#4090d0');
      sky.addColorStop(0.4, '#60b0e8');
      sky.addColorStop(1, '#a0d4f8');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, w, h);

      // Fluffy cumulus clouds
      function drawCloud(cx, cy, scale) {
        ctx.fillStyle = '#ffffff';
        ctx.globalAlpha = 0.9;
        const r = 18 * scale;
        for (const [dx, dy, dr] of [[0,0,r], [-r*.7,r*.15,r*.8], [r*.7,r*.1,r*.85], [-r*.3,-r*.4,r*.65], [r*.35,-r*.35,r*.6], [0,-r*.55,r*.5]]) {
          ctx.beginPath();
          ctx.arc(cx + dx, cy + dy, dr, 0, Math.PI * 2);
          ctx.fill();
        }
        // Soft shadow on bottom
        ctx.globalAlpha = 0.08;
        ctx.fillStyle = '#6090b0';
        for (const [dx, dy, dr] of [[0, r*.3, r*.9], [-r*.5, r*.35, r*.6], [r*.5, r*.3, r*.65]]) {
          ctx.beginPath();
          ctx.arc(cx + dx, cy + dy, dr, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }
      drawCloud(180, 75, 3.5);
      drawCloud(580, 50, 4.5);
      drawCloud(880, 90, 2.8);
      drawCloud(380, 110, 2);

      // Distant hills (pale green-blue)
      ctx.fillStyle = '#78c090';
      ctx.beginPath();
      ctx.moveTo(0, h * 0.6);
      for (let x = 0; x <= w; x += 3) {
        const y = h * 0.6 - Math.sin(x * 0.003) * 25 - Math.sin(x * 0.007 + 2) * 12;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(w, h); ctx.lineTo(0, h);
      ctx.fill();

      // Middle hills (warm green)
      ctx.fillStyle = '#58b850';
      ctx.beginPath();
      ctx.moveTo(0, h * 0.7);
      for (let x = 0; x <= w; x += 3) {
        const y = h * 0.7 - Math.sin(x * 0.004 + 1) * 20 - Math.sin(x * 0.01) * 10;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(w, h); ctx.lineTo(0, h);
      ctx.fill();

      // Foreground meadow
      ctx.fillStyle = '#40a838';
      ctx.beginPath();
      ctx.moveTo(0, h * 0.82);
      for (let x = 0; x <= w; x += 3) {
        const y = h * 0.82 - Math.sin(x * 0.005 + 3) * 12 - Math.sin(x * 0.013) * 6;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(w, h); ctx.lineTo(0, h);
      ctx.fill();

      // Tree on a hill
      ctx.fillStyle = '#4a3528';
      ctx.fillRect(w * 0.32 - 3, h * 0.58, 6, 22);
      ctx.fillStyle = '#3a7830';
      for (const [dx, dy, r] of [[0,-14,16], [-10,-7,12], [10,-7,12], [-4,-22,10], [5,-18,9]]) {
        ctx.beginPath();
        ctx.arc(w * 0.32 + dx, h * 0.58 + dy, r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = '#4a8838';
      for (const [dx, dy, r] of [[-6,-18,8], [7,-10,9]]) {
        ctx.beginPath();
        ctx.arc(w * 0.32 + dx, h * 0.58 + dy, r, 0, Math.PI * 2);
        ctx.fill();
      }

      // Little red-roofed house
      ctx.fillStyle = '#c04838';
      ctx.beginPath();
      ctx.moveTo(w * 0.68, h * 0.64);
      ctx.lineTo(w * 0.68 - 16, h * 0.68);
      ctx.lineTo(w * 0.68 + 16, h * 0.68);
      ctx.fill();
      ctx.fillStyle = '#e8ddd0';
      ctx.fillRect(w * 0.68 - 12, h * 0.68, 24, 16);
      ctx.fillStyle = '#80b8d8';
      ctx.fillRect(w * 0.68 - 4, h * 0.685, 8, 7);

      // Grass tufts in foreground
      ctx.strokeStyle = '#4a9040';
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.4;
      for (let i = 0; i < 30; i++) {
        const gx = Math.random() * w;
        const gy = h * 0.82 + Math.random() * (h * 0.18);
        const gh = 4 + Math.random() * 8;
        ctx.beginPath();
        ctx.moveTo(gx, gy);
        ctx.lineTo(gx - 2, gy - gh);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(gx + 3, gy);
        ctx.lineTo(gx + 5, gy - gh * 0.8);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      // Tiny birds in the sky
      ctx.strokeStyle = '#405060';
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.3;
      for (const [bx, by] of [[300, 130], [320, 125], [700, 80], [720, 85], [500, 100]]) {
        ctx.beginPath();
        ctx.moveTo(bx - 4, by + 2);
        ctx.quadraticCurveTo(bx, by - 2, bx + 4, by + 2);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      // Status bar
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = '20px system-ui, sans-serif';
      ctx.textAlign = 'right';
      const now = new Date();
      ctx.fillText(`${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`, w - 20, 28);

      return new THREE.CanvasTexture(cv);
    }

    const screenMat = new THREE.MeshStandardMaterial({
      map: createScreenTexture(),
      roughness: 0.3,
      metalness: 0.0,
      emissive: 0x88c0e0,
      emissiveIntensity: 0.45,
    });

    const screen = new THREE.Mesh(
      new THREE.ShapeGeometry(roundedRect(2.95, 1.4, 0.06)),
      screenMat
    );
    screen.position.set(0, 0.05, 0.2545);
    product.add(screen);

    // Screen glass
    const screenGlass = new THREE.Mesh(
      new THREE.ShapeGeometry(roundedRect(3.0, 1.48, 0.08)),
      new THREE.MeshPhysicalMaterial({
        transparent: true, opacity: 0.03, roughness: 0.0,
        clearcoat: 1.0, clearcoatRoughness: 0.02,
      })
    );
    screenGlass.position.set(0, 0.05, 0.257);
    product.add(screenGlass);

    // ── D-pad ──────────────────────────────────
    const dpadH = new THREE.Mesh(new RoundedBoxGeometry(0.5, 0.15, 0.04, 3, 0.03), dpadMat);
    dpadH.position.set(-1.65, 0.05, 0.27);
    const dpadV = new THREE.Mesh(new RoundedBoxGeometry(0.15, 0.5, 0.04, 3, 0.03), dpadMat);
    dpadV.position.set(-1.65, 0.05, 0.27);
    product.add(dpadH, dpadV);

    // ── Face Buttons ───────────────────────────
    const fbGeo = new THREE.CylinderGeometry(0.055, 0.055, 0.03, 16);
    fbGeo.rotateX(Math.PI / 2);
    const fbData = [
      [0, 0.2, 0x90dda0],    // top — mint
      [0.2, 0, 0xf0a0a0],    // right — strawberry
      [0, -0.2, 0x90b8e8],   // bottom — sky
      [-0.2, 0, 0xd0a0e0],   // left — grape
    ];
    for (const [dx, dy, color] of fbData) {
      const btn = new THREE.Mesh(fbGeo,
        new THREE.MeshStandardMaterial({ color, roughness: 0.4, metalness: 0.1 })
      );
      btn.position.set(1.65 + dx, 0.05 + dy, 0.27);
      product.add(btn);
    }

    // ── Analog Nub ─────────────────────────────
    const nubBase = new THREE.Mesh(
      new THREE.CylinderGeometry(0.1, 0.1, 0.012, 24),
      new THREE.MeshStandardMaterial({ color: 0xDCDDDD, roughness: 0.6, metalness: 0.05 })
    );
    nubBase.rotateX(Math.PI / 2);
    nubBase.position.set(-1.65, -0.5, 0.26);
    product.add(nubBase);

    const nubCap = new THREE.Mesh(
      new THREE.CylinderGeometry(0.065, 0.065, 0.02, 24),
      new THREE.MeshStandardMaterial({ color: 0xDCDDDD, roughness: 0.4, metalness: 0.1 })
    );
    nubCap.rotateX(Math.PI / 2);
    nubCap.position.set(-1.65, -0.5, 0.275);
    product.add(nubCap);

    // ── Start / Select ─────────────────────────
    const smGeo = new THREE.CylinderGeometry(0.028, 0.028, 0.012, 12);
    smGeo.rotateX(Math.PI / 2);
    for (const x of [-0.25, 0.25]) {
      const btn = new THREE.Mesh(smGeo, smallBtnMat);
      btn.position.set(x, -0.62, 0.26);
      product.add(btn);
    }

    // ── Shoulder Buttons ───────────────────────
    const shoulderGeo = new RoundedBoxGeometry(0.6, 0.055, 0.14, 3, 0.025);
    const shoulderMat = new THREE.MeshStandardMaterial({ color: 0xDCDDDD, roughness: 0.4, metalness: 0.1 });
    for (const x of [-1.8, 1.8]) {
      const sh = new THREE.Mesh(shoulderGeo, shoulderMat);
      sh.position.set(x, 1.12, -0.04);
      product.add(sh);
    }

    // ── Speaker Grilles ────────────────────────
    const slotGeo = new RoundedBoxGeometry(0.12, 0.018, 0.004, 2, 0.008);
    const slotMat = new THREE.MeshStandardMaterial({ color: 0xDCDDDD, roughness: 0.85 });
    for (let i = 0; i < 5; i++) {
      for (const x of [-2.08, 2.08]) {
        const slot = new THREE.Mesh(slotGeo, slotMat);
        slot.position.set(x, 0.16 - i * 0.055, 0.252);
        product.add(slot);
      }
    }

    // ── Power LED ──────────────────────────────
    const powerLedMat = new THREE.MeshStandardMaterial({
      color: 0xddaa44, emissive: 0xddaa44, emissiveIntensity: 0.3,
    });
    const powerLed = new THREE.Mesh(new THREE.CircleGeometry(0.012, 10), powerLedMat);
    powerLed.position.set(-2.15, -0.5, 0.252);
    product.add(powerLed);

    // ── Brand Mark ─────────────────────────────
    function createBrandTexture() {
      const cv = document.createElement('canvas');
      cv.width = 256; cv.height = 32;
      const ctx = cv.getContext('2d');
      ctx.fillStyle = 'rgba(100,100,100,0.25)';
      ctx.font = '400 16px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('DEVICE 01', 128, 16);
      return new THREE.CanvasTexture(cv);
    }

    const brandMark = new THREE.Mesh(
      new THREE.PlaneGeometry(0.6, 0.1),
      new THREE.MeshBasicMaterial({ map: createBrandTexture(), transparent: true, depthWrite: false })
    );
    brandMark.position.set(0, -0.85, 0.254);
    product.add(brandMark);

    // ── Power Button (top right) ───────────────
    const powerBtn = new THREE.Mesh(
      new RoundedBoxGeometry(0.2, 0.04, 0.1, 3, 0.02),
      chromeMat
    );
    powerBtn.position.set(2.2, 1.12, 0.05);
    product.add(powerBtn);

    // ── Lighting ───────────────────────────────
    const key = new THREE.DirectionalLight(0xe8e0f0, 1.8);
    key.position.set(4, 5, 6);
    key.castShadow = true;
    key.shadow.mapSize.set(2048, 2048);
    key.shadow.camera.near = 0.1; key.shadow.camera.far = 20;
    key.shadow.camera.left = -5; key.shadow.camera.right = 5;
    key.shadow.camera.top = 4; key.shadow.camera.bottom = -4;
    key.shadow.radius = 4; key.shadow.bias = -0.0005;
    scene.add(key);

    scene.add(new THREE.DirectionalLight(0xd8d0e0, 0.5).translateX(-4).translateY(3).translateZ(2));
    scene.add(new THREE.DirectionalLight(0xe0d8e8, 0.6).translateY(2).translateZ(-5));
    scene.add(new THREE.HemisphereLight(0x3a3440, 0x1a181e, 0.4));
    scene.add(new THREE.AmbientLight(0xc8c0d0, 0.25));

    // ── Ground ─────────────────────────────────
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 30),
      new THREE.MeshStandardMaterial({ color: 0x28262e, roughness: 0.4, metalness: 0.0 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1.15;
    ground.receiveShadow = true;
    scene.add(ground);

    const csCv = document.createElement('canvas');
    csCv.width = 256; csCv.height = 256;
    const csCtx = csCv.getContext('2d');
    const csG = csCtx.createRadialGradient(128, 128, 0, 128, 128, 128);
    csG.addColorStop(0, 'rgba(0,0,0,0.12)');
    csG.addColorStop(0.6, 'rgba(0,0,0,0.04)');
    csG.addColorStop(1, 'rgba(0,0,0,0)');
    csCtx.fillStyle = csG;
    csCtx.fillRect(0, 0, 256, 256);
    const contactShadow = new THREE.Mesh(
      new THREE.PlaneGeometry(6, 3),
      new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(csCv), transparent: true, depthWrite: false })
    );
    contactShadow.rotation.x = -Math.PI / 2;
    contactShadow.position.y = -1.145;
    scene.add(contactShadow);

    // ── Animate ────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);
      product.position.y = Math.sin(Date.now() * 0.0008) * 0.005;
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
