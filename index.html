<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLY-01 — Product Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(180deg, #e8d8e8 0%, #f0e0e0 40%, #f8ece0 70%, #f5f0ea 100%);
      overflow: hidden;
      font-family: 'Geist', system-ui, -apple-system, sans-serif;
      color: #333;
      -webkit-font-smoothing: antialiased;
    }
    canvas { display: block; cursor: grab; }
    canvas:active { cursor: grabbing; }

    .vignette {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.06) 100%);
    }

    .product-info {
      position: fixed; bottom: 40px; left: 40px; z-index: 10;
    }
    .product-info h1 {
      font-family: 'Geist Mono', 'JetBrains Mono', monospace;
      font-size: 24px; font-weight: 500; letter-spacing: 0.06em;
      color: #222; margin-bottom: 4px;
    }
    .product-info p {
      font-size: 11px; color: rgba(0,0,0,0.35); font-weight: 400;
      letter-spacing: 0.12em; text-transform: uppercase;
    }

    .color-swatches {
      position: fixed; bottom: 44px; right: 40px;
      display: flex; gap: 12px; z-index: 10;
    }
    .swatch {
      width: 24px; height: 24px; border-radius: 50%;
      border: 2px solid rgba(0,0,0,0.08); cursor: pointer;
      transition: border-color 0.3s, transform 0.2s;
    }
    .swatch:hover { transform: scale(1.2); }
    .swatch.active { border-color: rgba(0,0,0,0.45); }
    .swatch:focus-visible { outline: 2px solid rgba(0,0,0,0.5); outline-offset: 2px; }

    @media (max-width: 768px) {
      .product-info { bottom: 24px; left: 24px; }
      .product-info h1 { font-size: 18px; }
      .color-swatches { bottom: 28px; right: 24px; gap: 10px; }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="vignette"></div>

  <div class="product-info">
    <h1>PLY-01</h1>
    <p>Meridian Systems</p>
  </div>

  <div class="color-swatches">
    <button class="swatch active" data-color="#EAE5E3" style="background:#EAE5E3" aria-label="Soshoku"></button>
    <button class="swatch" data-color="#FBFAF5" style="background:#FBFAF5" aria-label="Kinariiro"></button>
    <button class="swatch" data-color="#F7FCFE" style="background:#F7FCFE" aria-label="Unoharairo"></button>
    <button class="swatch" data-color="#E7E7EB" style="background:#E7E7EB" aria-label="Murasakisuishiyou"></button>
    <button class="swatch" data-color="#DCDDDD" style="background:#DCDDDD" aria-label="Shironezu"></button>
  </div>

  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }}
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    const canvas = document.getElementById('c');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.3;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene = new THREE.Scene();

    // Anime pastel gradient background
    const bgCv = document.createElement('canvas');
    bgCv.width = 2; bgCv.height = 512;
    const bgCtx = bgCv.getContext('2d');
    const bgGrad = bgCtx.createLinearGradient(0, 0, 0, 512);
    bgGrad.addColorStop(0, '#e0d0e4');
    bgGrad.addColorStop(0.35, '#ecd8dc');
    bgGrad.addColorStop(0.65, '#f4e4d8');
    bgGrad.addColorStop(1, '#f2ede6');
    bgCtx.fillStyle = bgGrad;
    bgCtx.fillRect(0, 0, 2, 512);
    scene.background = new THREE.CanvasTexture(bgCv);

    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
    pmrem.dispose();

    const camera = new THREE.PerspectiveCamera(28, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(5, 3, 7);

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 0, 0);
    controls.minDistance = 4;
    controls.maxDistance = 14;
    controls.maxPolarAngle = Math.PI * 0.85;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.4;

    // ── Materials ──────────────────────────────
    const bodyMat = new THREE.MeshPhysicalMaterial({
      color: 0xEAE5E3,
      roughness: 0.18,
      metalness: 0.0,
      clearcoat: 0.4,
      clearcoatRoughness: 0.15,
    });

    const chromeMat = new THREE.MeshStandardMaterial({
      color: 0xE5E4E6, roughness: 0.08, metalness: 0.9,
    });

    const dpadMat = new THREE.MeshStandardMaterial({
      color: 0xDCDDDD, roughness: 0.5, metalness: 0.05,
    });

    const smallBtnMat = new THREE.MeshStandardMaterial({
      color: 0xE5E4E6, roughness: 0.45, metalness: 0.08,
    });

    // ── Product Group ──────────────────────────
    const product = new THREE.Group();
    scene.add(product);

    // ── Body (landscape handheld) ──────────────
    const body = new THREE.Mesh(
      new RoundedBoxGeometry(5.0, 2.2, 0.5, 6, 0.25),
      bodyMat
    );
    body.castShadow = true;
    product.add(body);

    // ── Cel outline (anime edge) ────────────────
    const outline = new THREE.Mesh(
      new RoundedBoxGeometry(5.0, 2.2, 0.5, 6, 0.25),
      new THREE.MeshBasicMaterial({ color: 0x3a3040, side: THREE.BackSide })
    );
    outline.scale.multiplyScalar(1.025);
    product.add(outline);

    // ── Internals (faintly visible) ────────────
    const board = new THREE.Mesh(
      new THREE.BoxGeometry(3.5, 1.5, 0.02),
      new THREE.MeshStandardMaterial({ color: 0x1a7a3a, roughness: 0.7, metalness: 0.1, side: THREE.DoubleSide })
    );
    product.add(board);

    for (const [x, y, w, h] of [[0.6, 0.1, 0.4, 0.4], [-0.4, 0.3, 0.22, 0.15], [-0.4, -0.15, 0.22, 0.15]]) {
      const c = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, 0.035),
        new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.4, metalness: 0.5 })
      );
      c.position.set(x, y, 0.025);
      product.add(c);
    }

    // ── Screen ─────────────────────────────────
    function roundedRect(w, h, r) {
      const s = new THREE.Shape();
      const hw = w / 2, hh = h / 2;
      s.moveTo(-hw + r, -hh); s.lineTo(hw - r, -hh);
      s.quadraticCurveTo(hw, -hh, hw, -hh + r); s.lineTo(hw, hh - r);
      s.quadraticCurveTo(hw, hh, hw - r, hh); s.lineTo(-hw + r, hh);
      s.quadraticCurveTo(-hw, hh, -hw, hh - r); s.lineTo(-hw, -hh + r);
      s.quadraticCurveTo(-hw, -hh, -hw + r, -hh);
      return s;
    }

    // Screen bezel
    const screenBezel = new THREE.Mesh(
      new THREE.ShapeGeometry(roundedRect(3.1, 1.55, 0.1)),
      new THREE.MeshStandardMaterial({ color: 0x1a1816, roughness: 0.88, metalness: 0.05 })
    );
    screenBezel.position.set(0, 0.05, 0.253);
    product.add(screenBezel);

    // Screen display — anime sunset sky
    function createScreenTexture() {
      const w = 1024, h = 512;
      const cv = document.createElement('canvas');
      cv.width = w; cv.height = h;
      const ctx = cv.getContext('2d');

      // Rich sunset gradient
      const sky = ctx.createLinearGradient(0, 0, 0, h);
      sky.addColorStop(0, '#1a1038');
      sky.addColorStop(0.15, '#38204a');
      sky.addColorStop(0.3, '#803868');
      sky.addColorStop(0.45, '#d86868');
      sky.addColorStop(0.55, '#e89058');
      sky.addColorStop(0.68, '#f0b868');
      sky.addColorStop(0.82, '#f8d888');
      sky.addColorStop(1, '#fce8a8');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, w, h);

      // Stars in upper sky
      ctx.fillStyle = '#ffffff';
      for (let i = 0; i < 60; i++) {
        const sx = Math.random() * w;
        const sy = Math.random() * h * 0.3;
        const sr = 0.5 + Math.random() * 1.5;
        ctx.globalAlpha = 0.2 + Math.random() * 0.5;
        ctx.beginPath();
        ctx.arc(sx, sy, sr, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // Sun disc
      const sunX = w * 0.65, sunY = h * 0.62;
      const sunG = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 80);
      sunG.addColorStop(0, 'rgba(255,240,220,0.9)');
      sunG.addColorStop(0.3, 'rgba(255,200,140,0.5)');
      sunG.addColorStop(0.7, 'rgba(255,160,100,0.15)');
      sunG.addColorStop(1, 'rgba(255,120,80,0)');
      ctx.fillStyle = sunG;
      ctx.fillRect(sunX - 80, sunY - 80, 160, 160);

      // Clouds with rim lighting
      for (const [cx, cy, rx, ry, a] of [
        [180, 130, 140, 28, 0.3], [550, 90, 180, 35, 0.25], [850, 155, 100, 22, 0.3],
        [350, 175, 80, 16, 0.2], [700, 200, 60, 13, 0.15], [100, 200, 70, 15, 0.2],
      ]) {
        // Cloud body
        ctx.globalAlpha = a;
        const cg = ctx.createRadialGradient(cx, cy, rx * 0.2, cx, cy, rx);
        cg.addColorStop(0, '#f8d0c0');
        cg.addColorStop(0.6, 'rgba(240,180,160,0.4)');
        cg.addColorStop(1, 'rgba(220,140,130,0)');
        ctx.fillStyle = cg;
        ctx.beginPath();
        ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
        ctx.fill();
        // Bright rim on bottom edge
        ctx.globalAlpha = a * 0.6;
        const rg = ctx.createRadialGradient(cx, cy + ry * 0.3, rx * 0.3, cx, cy + ry * 0.3, rx * 0.8);
        rg.addColorStop(0, '#ffe8c0');
        rg.addColorStop(1, 'rgba(255,220,180,0)');
        ctx.fillStyle = rg;
        ctx.beginPath();
        ctx.ellipse(cx, cy + ry * 0.3, rx * 0.7, ry * 0.6, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // Distant mountains
      ctx.fillStyle = '#4a2850';
      ctx.globalAlpha = 0.35;
      ctx.beginPath();
      ctx.moveTo(0, h * 0.78);
      for (let x = 0; x <= w; x += 3) {
        const y = h * 0.78 - Math.sin(x * 0.003) * 40 - Math.sin(x * 0.009) * 18 - Math.sin(x * 0.0015 + 1) * 25;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(w, h); ctx.lineTo(0, h);
      ctx.fill();
      ctx.globalAlpha = 1;

      // City silhouette
      ctx.fillStyle = '#18101e';
      ctx.globalAlpha = 0.6;
      ctx.beginPath();
      ctx.moveTo(0, h * 0.9);
      const bld = [0,.9, 30,.86, 50,.88, 70,.78, 90,.82, 110,.74, 130,.78, 155,.84, 180,.8, 200,.7, 215,.74, 230,.82, 260,.86, 290,.78, 310,.72, 325,.68, 340,.72, 360,.82, 400,.86, 440,.8, 460,.72, 475,.68, 490,.74, 520,.84, 560,.88, 600,.82, 620,.75, 640,.7, 655,.74, 670,.82, 710,.86, 740,.78, 760,.74, 780,.78, 810,.84, 850,.8, 870,.72, 885,.76, 900,.84, 940,.88, 960,.82, 980,.86, 1024,.9];
      for (let i = 0; i < bld.length; i += 2) ctx.lineTo(bld[i], h * bld[i + 1]);
      ctx.lineTo(w, h); ctx.lineTo(0, h);
      ctx.fill();

      // Lit windows in buildings
      ctx.fillStyle = '#f8d888';
      for (let i = 0; i < 40; i++) {
        const wx = 30 + Math.random() * (w - 60);
        const wy = h * 0.76 + Math.random() * (h * 0.18);
        ctx.globalAlpha = 0.3 + Math.random() * 0.5;
        ctx.fillRect(wx, wy, 2, 2);
      }
      ctx.globalAlpha = 1;

      // Telephone pole + power lines (right side)
      ctx.strokeStyle = '#1a1020';
      ctx.globalAlpha = 0.5;
      ctx.lineWidth = 3;
      const poleX = w * 0.82;
      ctx.beginPath();
      ctx.moveTo(poleX, h * 0.45);
      ctx.lineTo(poleX, h);
      ctx.stroke();
      // Crossbar
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(poleX - 30, h * 0.48);
      ctx.lineTo(poleX + 30, h * 0.48);
      ctx.stroke();
      // Wires
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.3;
      for (const [wy, sag] of [[h * 0.47, 12], [h * 0.49, 18], [h * 0.46, 8]]) {
        ctx.beginPath();
        ctx.moveTo(0, wy + sag * 0.5);
        for (let x = 0; x <= w; x += 4) {
          const catenary = sag * Math.cosh((x - poleX) / (w * 0.4)) / Math.cosh(poleX / (w * 0.4));
          ctx.lineTo(x, wy + catenary);
        }
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      // Sakura petals
      for (let i = 0; i < 30; i++) {
        const px = Math.random() * w;
        const py = Math.random() * h * 0.75;
        const size = 3 + Math.random() * 7;
        const angle = Math.random() * Math.PI * 2;
        ctx.save();
        ctx.translate(px, py);
        ctx.rotate(angle);
        ctx.globalAlpha = 0.25 + Math.random() * 0.45;
        ctx.fillStyle = Math.random() > 0.5 ? '#f0a8b0' : '#f8c8d0';
        ctx.beginPath();
        ctx.ellipse(0, 0, size, size * 0.45, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      ctx.globalAlpha = 1;

      // Status bar
      ctx.fillStyle = 'rgba(255,255,255,0.65)';
      ctx.font = '22px system-ui, sans-serif';
      ctx.textAlign = 'right';
      const now = new Date();
      ctx.fillText(`${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`, w - 24, 32);

      ctx.strokeStyle = 'rgba(255,255,255,0.45)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(w - 88, 16, 24, 12);
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.fillRect(w - 86, 18, 18, 8);
      ctx.fillRect(w - 64, 20, 3, 4);

      return new THREE.CanvasTexture(cv);
    }

    const screenMat = new THREE.MeshStandardMaterial({
      map: createScreenTexture(),
      roughness: 0.3,
      metalness: 0.0,
      emissive: 0xd08868,
      emissiveIntensity: 0.1,
    });

    const screen = new THREE.Mesh(
      new THREE.ShapeGeometry(roundedRect(2.95, 1.4, 0.06)),
      screenMat
    );
    screen.position.set(0, 0.05, 0.2545);
    product.add(screen);

    // Screen glass
    const screenGlass = new THREE.Mesh(
      new THREE.ShapeGeometry(roundedRect(3.0, 1.48, 0.08)),
      new THREE.MeshPhysicalMaterial({
        transparent: true, opacity: 0.03, roughness: 0.0,
        clearcoat: 1.0, clearcoatRoughness: 0.02,
      })
    );
    screenGlass.position.set(0, 0.05, 0.257);
    product.add(screenGlass);

    // ── D-pad ──────────────────────────────────
    const dpadH = new THREE.Mesh(new RoundedBoxGeometry(0.5, 0.15, 0.04, 3, 0.03), dpadMat);
    dpadH.position.set(-1.65, 0.05, 0.27);
    const dpadV = new THREE.Mesh(new RoundedBoxGeometry(0.15, 0.5, 0.04, 3, 0.03), dpadMat);
    dpadV.position.set(-1.65, 0.05, 0.27);
    product.add(dpadH, dpadV);

    // ── Face Buttons ───────────────────────────
    const fbGeo = new THREE.CylinderGeometry(0.055, 0.055, 0.03, 16);
    fbGeo.rotateX(Math.PI / 2);
    const fbData = [
      [0, 0.2, 0xF7FCFE],    // top — unoharairo (faint blue-white)
      [0.2, 0, 0xEAE5E3],    // right — soshoku (warm base)
      [0, -0.2, 0xE7E7EB],   // bottom — murasakisuishiyou (purple water)
      [-0.2, 0, 0xFBFAF5],   // left — kinariiro (dough)
    ];
    for (const [dx, dy, color] of fbData) {
      const btn = new THREE.Mesh(fbGeo,
        new THREE.MeshStandardMaterial({ color, roughness: 0.4, metalness: 0.1 })
      );
      btn.position.set(1.65 + dx, 0.05 + dy, 0.27);
      product.add(btn);
    }

    // ── Analog Nub ─────────────────────────────
    const nubBase = new THREE.Mesh(
      new THREE.CylinderGeometry(0.1, 0.1, 0.012, 24),
      new THREE.MeshStandardMaterial({ color: 0xDCDDDD, roughness: 0.6, metalness: 0.05 })
    );
    nubBase.rotateX(Math.PI / 2);
    nubBase.position.set(-1.65, -0.5, 0.26);
    product.add(nubBase);

    const nubCap = new THREE.Mesh(
      new THREE.CylinderGeometry(0.065, 0.065, 0.02, 24),
      new THREE.MeshStandardMaterial({ color: 0xDCDDDD, roughness: 0.4, metalness: 0.1 })
    );
    nubCap.rotateX(Math.PI / 2);
    nubCap.position.set(-1.65, -0.5, 0.275);
    product.add(nubCap);

    // ── Start / Select ─────────────────────────
    const smGeo = new THREE.CylinderGeometry(0.028, 0.028, 0.012, 12);
    smGeo.rotateX(Math.PI / 2);
    for (const x of [-0.25, 0.25]) {
      const btn = new THREE.Mesh(smGeo, smallBtnMat);
      btn.position.set(x, -0.62, 0.26);
      product.add(btn);
    }

    // ── Shoulder Buttons ───────────────────────
    const shoulderGeo = new RoundedBoxGeometry(0.6, 0.055, 0.14, 3, 0.025);
    const shoulderMat = new THREE.MeshStandardMaterial({ color: 0xDCDDDD, roughness: 0.4, metalness: 0.1 });
    for (const x of [-1.8, 1.8]) {
      const sh = new THREE.Mesh(shoulderGeo, shoulderMat);
      sh.position.set(x, 1.12, -0.04);
      product.add(sh);
    }

    // ── Speaker Grilles ────────────────────────
    const slotGeo = new RoundedBoxGeometry(0.12, 0.018, 0.004, 2, 0.008);
    const slotMat = new THREE.MeshStandardMaterial({ color: 0xDCDDDD, roughness: 0.85 });
    for (let i = 0; i < 5; i++) {
      for (const x of [-2.08, 2.08]) {
        const slot = new THREE.Mesh(slotGeo, slotMat);
        slot.position.set(x, 0.16 - i * 0.055, 0.252);
        product.add(slot);
      }
    }

    // ── Power LED ──────────────────────────────
    const powerLedMat = new THREE.MeshStandardMaterial({
      color: 0xddaa44, emissive: 0xddaa44, emissiveIntensity: 0.3,
    });
    const powerLed = new THREE.Mesh(new THREE.CircleGeometry(0.012, 10), powerLedMat);
    powerLed.position.set(-2.15, -0.5, 0.252);
    product.add(powerLed);

    // ── Brand Mark ─────────────────────────────
    function createBrandTexture() {
      const cv = document.createElement('canvas');
      cv.width = 256; cv.height = 32;
      const ctx = cv.getContext('2d');
      ctx.fillStyle = 'rgba(100,100,100,0.25)';
      ctx.font = '400 16px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('PLY-01', 128, 16);
      return new THREE.CanvasTexture(cv);
    }

    const brandMark = new THREE.Mesh(
      new THREE.PlaneGeometry(0.6, 0.1),
      new THREE.MeshBasicMaterial({ map: createBrandTexture(), transparent: true, depthWrite: false })
    );
    brandMark.position.set(0, -0.85, 0.254);
    product.add(brandMark);

    // ── Power Button (top right) ───────────────
    const powerBtn = new THREE.Mesh(
      new RoundedBoxGeometry(0.2, 0.04, 0.1, 3, 0.02),
      chromeMat
    );
    powerBtn.position.set(2.2, 1.12, 0.05);
    product.add(powerBtn);

    // ── Lighting ───────────────────────────────
    const key = new THREE.DirectionalLight(0xfff8ee, 2.0);
    key.position.set(4, 5, 6);
    key.castShadow = true;
    key.shadow.mapSize.set(2048, 2048);
    key.shadow.camera.near = 0.1; key.shadow.camera.far = 20;
    key.shadow.camera.left = -5; key.shadow.camera.right = 5;
    key.shadow.camera.top = 4; key.shadow.camera.bottom = -4;
    key.shadow.radius = 4; key.shadow.bias = -0.0005;
    scene.add(key);

    scene.add(new THREE.DirectionalLight(0xfff8f0, 0.6).translateX(-4).translateY(3).translateZ(2));
    scene.add(new THREE.DirectionalLight(0xfff5ea, 0.8).translateY(2).translateZ(-5));
    scene.add(new THREE.HemisphereLight(0xf5f0e8, 0xddd8d0, 0.5));
    scene.add(new THREE.AmbientLight(0xfff8f0, 0.3));

    // ── Ground ─────────────────────────────────
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 30),
      new THREE.MeshStandardMaterial({ color: 0xF3F3F2, roughness: 0.35, metalness: 0.0 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1.15;
    ground.receiveShadow = true;
    scene.add(ground);

    const csCv = document.createElement('canvas');
    csCv.width = 256; csCv.height = 256;
    const csCtx = csCv.getContext('2d');
    const csG = csCtx.createRadialGradient(128, 128, 0, 128, 128, 128);
    csG.addColorStop(0, 'rgba(0,0,0,0.12)');
    csG.addColorStop(0.6, 'rgba(0,0,0,0.04)');
    csG.addColorStop(1, 'rgba(0,0,0,0)');
    csCtx.fillStyle = csG;
    csCtx.fillRect(0, 0, 256, 256);
    const contactShadow = new THREE.Mesh(
      new THREE.PlaneGeometry(6, 3),
      new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(csCv), transparent: true, depthWrite: false })
    );
    contactShadow.rotation.x = -Math.PI / 2;
    contactShadow.position.y = -1.145;
    scene.add(contactShadow);

    // ── Interactions ───────────────────────────
    let targetColor = new THREE.Color(0xEAE5E3);
    let screenOn = true;
    let targetScreenEmissive = 0.12;
    let targetScreenColor = new THREE.Color(1, 1, 1);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    canvas.addEventListener('pointerdown', (e) => {
      pointer.x = (e.clientX / innerWidth) * 2 - 1;
      pointer.y = -(e.clientY / innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      if (raycaster.intersectObject(powerBtn).length) {
        screenOn = !screenOn;
        targetScreenEmissive = screenOn ? 0.12 : 0.0;
        targetScreenColor.set(screenOn ? 1 : 0, screenOn ? 1 : 0, screenOn ? 1 : 0);
      }
    });

    canvas.addEventListener('pointermove', (e) => {
      pointer.x = (e.clientX / innerWidth) * 2 - 1;
      pointer.y = -(e.clientY / innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      canvas.style.cursor = raycaster.intersectObject(powerBtn).length ? 'pointer' : '';
    });

    document.querySelectorAll('.swatch').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        el.classList.add('active');
        targetColor.set(el.dataset.color);
      });
    });

    // ── Animate ────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);

      screenMat.emissiveIntensity += (targetScreenEmissive - screenMat.emissiveIntensity) * 0.06;
      screenMat.color.lerp(targetScreenColor, 0.06);
      powerLedMat.emissiveIntensity += ((screenOn ? 0.4 : 0.0) - powerLedMat.emissiveIntensity) * 0.06;
      bodyMat.color.lerp(targetColor, 0.08);
      product.position.y = Math.sin(Date.now() * 0.0008) * 0.005;

      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
