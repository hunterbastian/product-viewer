<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meridian Terminal — Product Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      overflow: hidden;
      font-family: 'Geist', system-ui, -apple-system, sans-serif;
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }
    canvas { display: block; cursor: grab; }
    canvas:active { cursor: grabbing; }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5) 100%);
    }

    .product-info {
      position: fixed;
      bottom: 40px;
      left: 40px;
      z-index: 10;
    }
    .product-info h1 {
      font-family: 'Geist Mono', 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }
    .product-info p {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      font-weight: 400;
    }

    .color-swatches {
      position: fixed;
      bottom: 44px;
      right: 40px;
      display: flex;
      gap: 12px;
      z-index: 10;
    }
    .swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.08);
      cursor: pointer;
      transition: border-color 0.3s, transform 0.2s;
    }
    .swatch:hover { transform: scale(1.2); }
    .swatch.active { border-color: rgba(255,255,255,0.6); }
    .swatch:focus-visible {
      outline: 2px solid rgba(255,255,255,0.8);
      outline-offset: 2px;
    }

    @media (max-width: 768px) {
      .product-info { bottom: 24px; left: 24px; }
      .product-info h1 { font-size: 18px; }
      .color-swatches { bottom: 28px; right: 24px; gap: 10px; }
      .swatch { width: 22px; height: 22px; }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="vignette"></div>

  <div class="product-info">
    <h1>MERIDIAN</h1>
    <p>Drag to explore</p>
  </div>

  <div class="color-swatches">
    <button class="swatch active" data-color="#00b4d8" style="background:#00b4d8" aria-label="Bondi Blue"></button>
    <button class="swatch" data-color="#ff8c42" style="background:#ff8c42" aria-label="Tangerine"></button>
    <button class="swatch" data-color="#7b4baf" style="background:#7b4baf" aria-label="Grape"></button>
    <button class="swatch" data-color="#7cb342" style="background:#7cb342" aria-label="Lime"></button>
    <button class="swatch" data-color="#ef5350" style="background:#ef5350" aria-label="Strawberry"></button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

    // ── Renderer ───────────────────────────────
    const canvas = document.getElementById('c');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    // ── Scene ──────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
    pmrem.dispose();

    // ── Camera & Controls ──────────────────────
    const camera = new THREE.PerspectiveCamera(30, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(4, 2, 6);

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 0.2, 0);
    controls.minDistance = 3;
    controls.maxDistance = 12;
    controls.maxPolarAngle = Math.PI * 0.85;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.4;

    // ── Post-processing ────────────────────────
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloom = new UnrealBloomPass(
      new THREE.Vector2(innerWidth, innerHeight),
      0.4, 0.6, 0.75
    );
    composer.addPass(bloom);
    composer.addPass(new OutputPass());

    // ── Materials ──────────────────────────────

    // Fruity translucent shell
    const bodyMat = new THREE.MeshPhysicalMaterial({
      color: 0x00b4d8,
      roughness: 0.08,
      metalness: 0.0,
      clearcoat: 1.0,
      clearcoatRoughness: 0.03,
    });

    const chromeMat = new THREE.MeshStandardMaterial({
      color: 0xeeeeee,
      roughness: 0.03,
      metalness: 0.99,
      emissive: 0xffffff,
      emissiveIntensity: 0.15,
    });

    const screenFrameMat = new THREE.MeshStandardMaterial({
      color: 0x0a0a0a,
      roughness: 0.92,
      metalness: 0.05,
    });

    // Terminal-green glowing hands
    const handMat = new THREE.MeshStandardMaterial({
      color: 0x00dd77,
      roughness: 0.3,
      metalness: 0.4,
      emissive: 0x00ff88,
      emissiveIntensity: 0.6,
      transparent: true,
    });

    const secondHandMat = new THREE.MeshStandardMaterial({
      color: 0x00ffaa,
      roughness: 0.3,
      metalness: 0.3,
      emissive: 0x00ffcc,
      emissiveIntensity: 0.8,
      transparent: true,
    });

    const darkMetalMat = new THREE.MeshStandardMaterial({
      color: 0x1a1a1a,
      roughness: 0.3,
      metalness: 0.7,
    });

    const redMat = new THREE.MeshStandardMaterial({
      color: 0xcc2222,
      roughness: 0.35,
      metalness: 0.1,
    });

    // ── Product Group ──────────────────────────
    const product = new THREE.Group();
    scene.add(product);

    // ── Body (tall, rounded, Mac-like) ─────────
    const body = new THREE.Mesh(
      new RoundedBoxGeometry(2.4, 3.0, 2.0, 8, 0.55),
      bodyMat
    );
    body.castShadow = true;
    body.receiveShadow = true;
    product.add(body);

    // ── Handle (arch on top) ───────────────────
    const handleGeo = new THREE.TorusGeometry(0.35, 0.05, 16, 32, Math.PI);
    const handle = new THREE.Mesh(handleGeo, bodyMat);
    handle.rotation.x = -Math.PI / 2;
    handle.position.set(0, 1.48, 0);
    handle.castShadow = true;
    product.add(handle);

    // ── Screen Frame (dark inset) ──────────────
    function roundedRect(w, h, r) {
      const s = new THREE.Shape();
      const hw = w / 2, hh = h / 2;
      s.moveTo(-hw + r, -hh);
      s.lineTo(hw - r, -hh);
      s.quadraticCurveTo(hw, -hh, hw, -hh + r);
      s.lineTo(hw, hh - r);
      s.quadraticCurveTo(hw, hh, hw - r, hh);
      s.lineTo(-hw + r, hh);
      s.quadraticCurveTo(-hw, hh, -hw, hh - r);
      s.lineTo(-hw, -hh + r);
      s.quadraticCurveTo(-hw, -hh, -hw + r, -hh);
      return s;
    }

    const screenFrame = new THREE.Mesh(
      new THREE.ShapeGeometry(roundedRect(1.9, 1.9, 0.18)),
      screenFrameMat
    );
    screenFrame.position.set(0, 0.3, 1.003);
    product.add(screenFrame);

    // ── Clock Face (CRT terminal style) ────────
    const CLOCK_R = 0.72;
    const CLOCK_Z = 1.008;

    function createClockTexture() {
      const s = 1024;
      const cv = document.createElement('canvas');
      cv.width = s; cv.height = s;
      const ctx = cv.getContext('2d');

      // Dark CRT background
      ctx.fillStyle = '#050f08';
      ctx.beginPath();
      ctx.arc(s / 2, s / 2, s / 2 - 2, 0, Math.PI * 2);
      ctx.fill();

      // Subtle scanlines
      ctx.strokeStyle = 'rgba(0,255,136,0.025)';
      ctx.lineWidth = 1;
      for (let y = 0; y < s; y += 4) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(s, y);
        ctx.stroke();
      }

      // Inner ring
      ctx.strokeStyle = 'rgba(0,255,136,0.1)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(s / 2, s / 2, s * 0.46, 0, Math.PI * 2);
      ctx.stroke();

      // Tick marks
      for (let i = 0; i < 60; i++) {
        const a = (i / 60) * Math.PI * 2 - Math.PI / 2;
        const hour = i % 5 === 0;
        const r0 = s * (hour ? 0.38 : 0.42);
        const r1 = s * 0.46;
        ctx.strokeStyle = hour ? '#00ff88' : 'rgba(0,255,136,0.25)';
        ctx.lineWidth = hour ? 4 : 1.5;
        ctx.beginPath();
        ctx.moveTo(s / 2 + Math.cos(a) * r0, s / 2 + Math.sin(a) * r0);
        ctx.lineTo(s / 2 + Math.cos(a) * r1, s / 2 + Math.sin(a) * r1);
        ctx.stroke();
      }

      // Numbers
      ctx.fillStyle = '#00ff88';
      ctx.font = '600 48px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (let i = 1; i <= 12; i++) {
        const a = (i / 12) * Math.PI * 2 - Math.PI / 2;
        const r = s * 0.32;
        ctx.fillText(String(i), s / 2 + Math.cos(a) * r, s / 2 + Math.sin(a) * r);
      }

      return new THREE.CanvasTexture(cv);
    }

    const clockTexture = createClockTexture();
    const clockFaceMat = new THREE.MeshStandardMaterial({
      map: clockTexture,
      roughness: 0.3,
      metalness: 0.0,
      emissive: 0x00ff88,
      emissiveIntensity: 0.4,
    });

    const clockFace = new THREE.Mesh(
      new THREE.CircleGeometry(CLOCK_R, 64),
      clockFaceMat
    );
    clockFace.position.set(0, 0.3, CLOCK_Z);
    product.add(clockFace);

    // Glass (slight green CRT tint)
    const glass = new THREE.Mesh(
      new THREE.CircleGeometry(CLOCK_R - 0.01, 64),
      new THREE.MeshPhysicalMaterial({
        transparent: true,
        opacity: 0.06,
        roughness: 0.0,
        metalness: 0.1,
        clearcoat: 1.0,
        clearcoatRoughness: 0.05,
        color: 0x003322,
      })
    );
    glass.position.set(0, 0.3, 1.05);
    product.add(glass);

    // Chrome bezel
    const bezel = new THREE.Mesh(
      new THREE.TorusGeometry(CLOCK_R + 0.01, 0.035, 24, 64),
      chromeMat
    );
    bezel.position.set(0, 0.3, 1.01);
    product.add(bezel);

    // ── Clock Hands ────────────────────────────
    function makeHand(w, len, thick, mat) {
      const g = new THREE.BoxGeometry(w, len, thick);
      g.translate(0, len / 2, 0);
      const m = new THREE.Mesh(g, mat);
      m.position.set(0, 0.3, CLOCK_Z + 0.012);
      return m;
    }

    const hourHand = makeHand(0.04, 0.3, 0.012, handMat);
    const minuteHand = makeHand(0.028, 0.45, 0.01, handMat);

    const secGeo = new THREE.BoxGeometry(0.012, 0.52, 0.006);
    secGeo.translate(0, 0.17, 0);
    const secondHand = new THREE.Mesh(secGeo, secondHandMat);
    secondHand.position.set(0, 0.3, CLOCK_Z + 0.017);

    product.add(hourHand, minuteHand, secondHand);

    // Center cap
    const capGeo = new THREE.CylinderGeometry(0.025, 0.025, 0.012, 16);
    capGeo.rotateX(Math.PI / 2);
    const cap = new THREE.Mesh(capGeo, chromeMat);
    cap.position.set(0, 0.3, CLOCK_Z + 0.022);
    product.add(cap);

    // ── Brand Mark (chin area) ─────────────────
    function createBrandTexture() {
      const cv = document.createElement('canvas');
      cv.width = 256; cv.height = 48;
      const ctx = cv.getContext('2d');
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.font = '300 18px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('MERIDIAN', 128, 24);
      return new THREE.CanvasTexture(cv);
    }

    const brandMark = new THREE.Mesh(
      new THREE.PlaneGeometry(0.8, 0.15),
      new THREE.MeshBasicMaterial({ map: createBrandTexture(), transparent: true, depthWrite: false })
    );
    brandMark.position.set(0, -0.7, 1.003);
    product.add(brandMark);

    // ── Red Button ─────────────────────────────
    const btnBase = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.05, 0.07, 24),
      darkMetalMat
    );
    btnBase.position.set(-0.6, 1.53, 0);
    product.add(btnBase);

    const button = new THREE.Mesh(
      new THREE.CylinderGeometry(0.065, 0.07, 0.06, 24),
      redMat
    );
    const BTN_Y = 1.57;
    button.position.set(-0.6, BTN_Y, 0);
    button.castShadow = true;
    product.add(button);

    // ── Base ───────────────────────────────────
    const base = new THREE.Mesh(
      new RoundedBoxGeometry(2.0, 0.08, 1.4, 4, 0.04),
      new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.7, metalness: 0.2 })
    );
    base.position.set(0, -1.54, 0);
    base.castShadow = true;
    base.receiveShadow = true;
    product.add(base);

    // ── Inner Glow (visible in reflections) ────
    const innerGlow = new THREE.PointLight(0x00ff88, 0, 3);
    innerGlow.position.set(0, 0.3, 0.5);
    product.add(innerGlow);

    // ── Lighting ───────────────────────────────
    const key = new THREE.DirectionalLight(0xfff5e6, 2.5);
    key.position.set(4, 5, 6);
    key.castShadow = true;
    key.shadow.mapSize.set(2048, 2048);
    key.shadow.camera.near = 0.1;
    key.shadow.camera.far = 20;
    key.shadow.camera.left = -4;
    key.shadow.camera.right = 4;
    key.shadow.camera.top = 4;
    key.shadow.camera.bottom = -4;
    key.shadow.radius = 4;
    key.shadow.bias = -0.0005;
    scene.add(key);

    scene.add(new THREE.DirectionalLight(0xcce0ff, 0.7).translateX(-4).translateY(3).translateZ(2));
    scene.add(new THREE.DirectionalLight(0xffffff, 1.2).translateY(2).translateZ(-5));
    scene.add(new THREE.AmbientLight(0x404040, 0.4));

    // ── Ground & Shadow ────────────────────────
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 30),
      new THREE.ShadowMaterial({ opacity: 0.2 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1.58;
    ground.receiveShadow = true;
    scene.add(ground);

    // Contact shadow
    function createContactShadow() {
      const s = 256;
      const cv = document.createElement('canvas');
      cv.width = s; cv.height = s;
      const ctx = cv.getContext('2d');
      const g = ctx.createRadialGradient(s / 2, s / 2, 0, s / 2, s / 2, s / 2);
      g.addColorStop(0, 'rgba(0,0,0,0.25)');
      g.addColorStop(0.6, 'rgba(0,0,0,0.08)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, s, s);
      return new THREE.CanvasTexture(cv);
    }

    const contactShadow = new THREE.Mesh(
      new THREE.PlaneGeometry(3.5, 2.5),
      new THREE.MeshBasicMaterial({ map: createContactShadow(), transparent: true, depthWrite: false })
    );
    contactShadow.rotation.x = -Math.PI / 2;
    contactShadow.position.y = -1.575;
    scene.add(contactShadow);

    // ── Interactions ───────────────────────────
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    let targetColor = new THREE.Color(0x00b4d8);

    // Clock on/off state
    let clockOn = true;
    let flashTime = 0;
    const FLASH_DURATION = 600;
    let targetClockEmissive = 0.4;
    let targetClockColor = new THREE.Color(1, 1, 1);
    let targetHandEmissive = 0.6;
    let targetSecondEmissive = 0.8;
    let targetHandOpacity = 1.0;

    // Button click — toggle clock
    canvas.addEventListener('pointerdown', (e) => {
      pointer.x = (e.clientX / innerWidth) * 2 - 1;
      pointer.y = -(e.clientY / innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      if (raycaster.intersectObject(button).length) {
        button.position.y = BTN_Y - 0.03;
        setTimeout(() => { button.position.y = BTN_Y; }, 120);

        clockOn = !clockOn;
        flashTime = Date.now();
        if (clockOn) {
          targetClockEmissive = 0.4;
          targetClockColor.set(1, 1, 1);
          targetHandEmissive = 0.6;
          targetSecondEmissive = 0.8;
          targetHandOpacity = 1.0;
        } else {
          targetClockEmissive = 0.0;
          targetClockColor.set(0, 0, 0);
          targetHandEmissive = 0.0;
          targetSecondEmissive = 0.0;
          targetHandOpacity = 0.0;
        }
      }
    });

    // Cursor on button hover
    canvas.addEventListener('pointermove', (e) => {
      pointer.x = (e.clientX / innerWidth) * 2 - 1;
      pointer.y = -(e.clientY / innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      canvas.style.cursor = raycaster.intersectObject(button).length ? 'pointer' : '';
    });

    // Color swatches
    document.querySelectorAll('.swatch').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        el.classList.add('active');
        targetColor.set(el.dataset.color);
      });
    });

    // ── Animation Loop ─────────────────────────
    const BASE_BLOOM = 0.4;

    function animate() {
      requestAnimationFrame(animate);

      // Real-time clock (only tick when on)
      if (clockOn) {
        const now = new Date();
        const s = now.getSeconds() + now.getMilliseconds() / 1000;
        const m = now.getMinutes() + s / 60;
        const h = (now.getHours() % 12) + m / 60;
        secondHand.rotation.z = -(s / 60) * Math.PI * 2;
        minuteHand.rotation.z = -(m / 60) * Math.PI * 2;
        hourHand.rotation.z = -(h / 12) * Math.PI * 2;
      }

      // Smooth transitions for clock face
      clockFaceMat.emissiveIntensity += (targetClockEmissive - clockFaceMat.emissiveIntensity) * 0.06;
      clockFaceMat.color.lerp(targetClockColor, 0.06);

      // Smooth transitions for hands
      handMat.emissiveIntensity += (targetHandEmissive - handMat.emissiveIntensity) * 0.06;
      handMat.opacity += (targetHandOpacity - handMat.opacity) * 0.08;
      secondHandMat.emissiveIntensity += (targetSecondEmissive - secondHandMat.emissiveIntensity) * 0.06;
      secondHandMat.opacity += (targetHandOpacity - secondHandMat.opacity) * 0.08;

      const handsVisible = handMat.opacity > 0.01;
      hourHand.visible = handsVisible;
      minuteHand.visible = handsVisible;
      secondHand.visible = handsVisible;
      cap.visible = handsVisible;

      // Subtle CRT flicker when on
      if (clockOn && Date.now() - flashTime > FLASH_DURATION) {
        clockFaceMat.emissiveIntensity += (Math.random() - 0.5) * 0.015;
      }

      // Flash / shine on toggle
      const flashElapsed = Date.now() - flashTime;
      if (flashElapsed < FLASH_DURATION) {
        const t = flashElapsed / FLASH_DURATION;
        const pulse = Math.sin(t * Math.PI) * (1 - t * 0.3);
        bloom.strength = BASE_BLOOM + pulse * 2.0;
        clockFaceMat.emissiveIntensity += pulse * 0.9;
        chromeMat.emissiveIntensity = 0.15 + pulse * 0.7;
        innerGlow.intensity = pulse * 4;
      } else {
        bloom.strength += (BASE_BLOOM - bloom.strength) * 0.1;
        chromeMat.emissiveIntensity += (0.15 - chromeMat.emissiveIntensity) * 0.1;
        innerGlow.intensity *= 0.9;
      }

      // Body color
      bodyMat.color.lerp(targetColor, 0.08);

      // Subtle float
      product.position.y = Math.sin(Date.now() * 0.0008) * 0.008;

      controls.update();
      composer.render();
    }
    animate();

    // ── Resize ─────────────────────────────────
    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      composer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
