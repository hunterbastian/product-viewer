<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLK-01 — Product Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #eeeef0;
      overflow: hidden;
      font-family: 'Geist', system-ui, -apple-system, sans-serif;
      color: #333;
      -webkit-font-smoothing: antialiased;
    }
    canvas { display: block; cursor: grab; }
    canvas:active { cursor: grabbing; }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.06) 100%);
    }

    .product-info {
      position: fixed;
      bottom: 40px;
      left: 40px;
      z-index: 10;
    }
    .product-info h1 {
      font-family: 'Geist Mono', 'JetBrains Mono', monospace;
      font-size: 24px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: #222;
      margin-bottom: 4px;
    }
    .product-info p {
      font-size: 11px;
      color: rgba(0,0,0,0.35);
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .color-swatches {
      position: fixed;
      bottom: 44px;
      right: 40px;
      display: flex;
      gap: 12px;
      z-index: 10;
    }
    .swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,0.08);
      cursor: pointer;
      transition: border-color 0.3s, transform 0.2s;
    }
    .swatch:hover { transform: scale(1.2); }
    .swatch.active { border-color: rgba(0,0,0,0.45); }
    .swatch:focus-visible {
      outline: 2px solid rgba(0,0,0,0.5);
      outline-offset: 2px;
    }

    @media (max-width: 768px) {
      .product-info { bottom: 24px; left: 24px; }
      .product-info h1 { font-size: 18px; }
      .color-swatches { bottom: 28px; right: 24px; gap: 10px; }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="vignette"></div>

  <div class="product-info">
    <h1>CLK-01</h1>
    <p>Meridian Systems</p>
  </div>

  <div class="color-swatches">
    <button class="swatch active" data-color="#c8c8cc" style="background:#c8c8cc" aria-label="Silver"></button>
    <button class="swatch" data-color="#e8e4dc" style="background:#e8e4dc" aria-label="Matte White"></button>
    <button class="swatch" data-color="#ff7b2e" style="background:#ff7b2e" aria-label="TE Orange"></button>
    <button class="swatch" data-color="#2a2a2e" style="background:#2a2a2e" aria-label="Charcoal"></button>
    <button class="swatch" data-color="#8a9878" style="background:#8a9878" aria-label="Sage"></button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    // ── Renderer ───────────────────────────────
    const canvas = document.getElementById('c');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.3;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    // ── Scene ──────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xeeeef0);

    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
    pmrem.dispose();

    // ── Camera & Controls ──────────────────────
    const camera = new THREE.PerspectiveCamera(30, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(4, 2, 6);

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 0.2, 0);
    controls.minDistance = 3;
    controls.maxDistance = 12;
    controls.maxPolarAngle = Math.PI * 0.85;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.4;

    // ── Materials ──────────────────────────────

    // Frosted silver polycarbonate shell
    const bodyMat = new THREE.MeshPhysicalMaterial({
      color: 0xc8c8cc,
      roughness: 0.15,
      metalness: 0.6,
      clearcoat: 0.8,
      clearcoatRoughness: 0.1,
      transmission: 0.2,
      thickness: 2.0,
      ior: 1.5,
    });

    // Brushed aluminum
    const chromeMat = new THREE.MeshStandardMaterial({
      color: 0xd4d4d8,
      roughness: 0.08,
      metalness: 0.95,
    });

    const screenFrameMat = new THREE.MeshStandardMaterial({
      color: 0x080808,
      roughness: 0.92,
      metalness: 0.05,
      side: THREE.DoubleSide,
    });

    // Dark metal clock hands
    const handMat = new THREE.MeshStandardMaterial({
      color: 0x1a1a1a,
      roughness: 0.3,
      metalness: 0.7,
      transparent: true,
    });

    // Orange second hand (TE accent)
    const secondHandMat = new THREE.MeshStandardMaterial({
      color: 0xff6020,
      roughness: 0.3,
      metalness: 0.4,
      transparent: true,
    });

    const darkMetalMat = new THREE.MeshStandardMaterial({
      color: 0x1a1a1a, roughness: 0.3, metalness: 0.7,
    });

    // TE orange button (no glow)
    const buttonMat = new THREE.MeshStandardMaterial({
      color: 0xff7b2e, roughness: 0.35, metalness: 0.1,
    });

    // ── Product Group ──────────────────────────
    const product = new THREE.Group();
    scene.add(product);

    // ── Body ───────────────────────────────────
    const body = new THREE.Mesh(
      new RoundedBoxGeometry(2.4, 3.0, 2.0, 8, 0.55),
      bodyMat
    );
    body.castShadow = true;
    product.add(body);

    // ── Handle ─────────────────────────────────
    const handle = new THREE.Mesh(
      new THREE.TorusGeometry(0.35, 0.05, 16, 32, Math.PI),
      bodyMat
    );
    handle.rotation.x = -Math.PI / 2;
    handle.position.set(0, 1.48, 0);
    handle.castShadow = true;
    product.add(handle);

    // ── Internals (visible through shell) ──────
    const board = new THREE.Mesh(
      new THREE.BoxGeometry(1.4, 2.0, 0.03),
      new THREE.MeshStandardMaterial({ color: 0x1a7a3a, roughness: 0.7, metalness: 0.1, side: THREE.DoubleSide })
    );
    board.position.z = 0.2;
    product.add(board);

    const chip = new THREE.Mesh(
      new THREE.BoxGeometry(0.35, 0.35, 0.05),
      new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.4, metalness: 0.5 })
    );
    chip.position.set(0, 0.5, 0.245);
    product.add(chip);

    const capColors = [0x2244cc, 0xcc8822, 0xcc2244];
    for (let i = 0; i < 3; i++) {
      const cap = new THREE.Mesh(
        new THREE.CylinderGeometry(0.025, 0.025, 0.1, 8),
        new THREE.MeshStandardMaterial({ color: capColors[i], roughness: 0.4, metalness: 0.3 })
      );
      cap.rotation.x = Math.PI / 2;
      cap.position.set(-0.3 + i * 0.2, -0.6, 0.27);
      product.add(cap);
    }

    // ── Screen Frame ───────────────────────────
    function roundedRect(w, h, r) {
      const s = new THREE.Shape();
      const hw = w / 2, hh = h / 2;
      s.moveTo(-hw + r, -hh);
      s.lineTo(hw - r, -hh);
      s.quadraticCurveTo(hw, -hh, hw, -hh + r);
      s.lineTo(hw, hh - r);
      s.quadraticCurveTo(hw, hh, hw - r, hh);
      s.lineTo(-hw + r, hh);
      s.quadraticCurveTo(-hw, hh, -hw, hh - r);
      s.lineTo(-hw, -hh + r);
      s.quadraticCurveTo(-hw, -hh, -hw + r, -hh);
      return s;
    }

    const screenFrame = new THREE.Mesh(
      new THREE.ShapeGeometry(roundedRect(1.9, 1.9, 0.18)),
      screenFrameMat
    );
    screenFrame.position.set(0, 0.3, 1.003);
    product.add(screenFrame);

    // ── Clock Face (amber, subtle) ─────────────
    const CLOCK_R = 0.72;
    const CLOCK_Z = 1.008;

    function createClockTexture() {
      const s = 1024;
      const cv = document.createElement('canvas');
      cv.width = s; cv.height = s;
      const ctx = cv.getContext('2d');

      ctx.fillStyle = '#0a0805';
      ctx.beginPath();
      ctx.arc(s / 2, s / 2, s / 2 - 2, 0, Math.PI * 2);
      ctx.fill();

      // Subtle scanlines
      ctx.strokeStyle = 'rgba(255,144,48,0.015)';
      ctx.lineWidth = 1;
      for (let y = 0; y < s; y += 4) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(s, y);
        ctx.stroke();
      }

      ctx.strokeStyle = 'rgba(255,144,48,0.06)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(s / 2, s / 2, s * 0.46, 0, Math.PI * 2);
      ctx.stroke();

      for (let i = 0; i < 60; i++) {
        const a = (i / 60) * Math.PI * 2 - Math.PI / 2;
        const hour = i % 5 === 0;
        const r0 = s * (hour ? 0.38 : 0.42);
        const r1 = s * 0.46;
        ctx.strokeStyle = hour ? '#ff9030' : 'rgba(255,144,48,0.18)';
        ctx.lineWidth = hour ? 4 : 1.5;
        ctx.beginPath();
        ctx.moveTo(s / 2 + Math.cos(a) * r0, s / 2 + Math.sin(a) * r0);
        ctx.lineTo(s / 2 + Math.cos(a) * r1, s / 2 + Math.sin(a) * r1);
        ctx.stroke();
      }

      ctx.fillStyle = '#ff9030';
      ctx.font = '600 48px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (let i = 1; i <= 12; i++) {
        const a = (i / 12) * Math.PI * 2 - Math.PI / 2;
        const r = s * 0.32;
        ctx.fillText(String(i), s / 2 + Math.cos(a) * r, s / 2 + Math.sin(a) * r);
      }

      return new THREE.CanvasTexture(cv);
    }

    const clockFaceMat = new THREE.MeshStandardMaterial({
      map: createClockTexture(),
      roughness: 0.3,
      metalness: 0.0,
      emissive: 0xff9030,
      emissiveIntensity: 0.2,
    });

    const clockFace = new THREE.Mesh(
      new THREE.CircleGeometry(CLOCK_R, 64), clockFaceMat
    );
    clockFace.position.set(0, 0.3, CLOCK_Z);
    product.add(clockFace);

    // Glass
    const glass = new THREE.Mesh(
      new THREE.CircleGeometry(CLOCK_R - 0.01, 64),
      new THREE.MeshPhysicalMaterial({
        transparent: true, opacity: 0.04, roughness: 0.0,
        metalness: 0.1, clearcoat: 1.0, clearcoatRoughness: 0.05,
      })
    );
    glass.position.set(0, 0.3, 1.05);
    product.add(glass);

    // Bezel
    const bezel = new THREE.Mesh(
      new THREE.TorusGeometry(CLOCK_R + 0.01, 0.035, 24, 64), chromeMat
    );
    bezel.position.set(0, 0.3, 1.01);
    product.add(bezel);

    // ── Clock Hands ────────────────────────────
    function makeHand(w, len, thick, mat) {
      const g = new THREE.BoxGeometry(w, len, thick);
      g.translate(0, len / 2, 0);
      const m = new THREE.Mesh(g, mat);
      m.position.set(0, 0.3, CLOCK_Z + 0.012);
      return m;
    }

    const hourHand = makeHand(0.04, 0.3, 0.012, handMat);
    const minuteHand = makeHand(0.028, 0.45, 0.01, handMat);

    const secGeo = new THREE.BoxGeometry(0.012, 0.52, 0.006);
    secGeo.translate(0, 0.17, 0);
    const secondHand = new THREE.Mesh(secGeo, secondHandMat);
    secondHand.position.set(0, 0.3, CLOCK_Z + 0.017);

    product.add(hourHand, minuteHand, secondHand);

    const capGeo = new THREE.CylinderGeometry(0.025, 0.025, 0.012, 16);
    capGeo.rotateX(Math.PI / 2);
    const cap = new THREE.Mesh(capGeo, chromeMat);
    cap.position.set(0, 0.3, CLOCK_Z + 0.022);
    product.add(cap);

    // ── Corner Bolts (TE detail) ───────────────
    const boltGeo = new THREE.CylinderGeometry(0.022, 0.022, 0.015, 6);
    boltGeo.rotateX(Math.PI / 2);
    const boltMat = new THREE.MeshStandardMaterial({ color: 0x999999, roughness: 0.2, metalness: 0.8 });
    for (const [x, y] of [[-0.86, 1.12], [0.86, 1.12], [-0.86, -0.52], [0.86, -0.52]]) {
      const bolt = new THREE.Mesh(boltGeo, boltMat);
      bolt.position.set(x, y, 1.004);
      product.add(bolt);
    }

    // ── Power LED ──────────────────────────────
    const powerLedMat = new THREE.MeshStandardMaterial({
      color: 0xff8020, emissive: 0xff8020, emissiveIntensity: 0.5,
    });
    const powerLed = new THREE.Mesh(new THREE.CircleGeometry(0.015, 12), powerLedMat);
    powerLed.position.set(0.5, -0.65, 1.004);
    product.add(powerLed);

    // ── Brand Mark ─────────────────────────────
    function createBrandTexture() {
      const cv = document.createElement('canvas');
      cv.width = 512; cv.height = 64;
      const ctx = cv.getContext('2d');
      ctx.fillStyle = 'rgba(80,80,80,0.35)';
      ctx.font = '500 24px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('CLK-01', 256, 20);
      ctx.fillStyle = 'rgba(80,80,80,0.15)';
      ctx.font = '300 13px "Courier New", monospace';
      ctx.fillText('MERIDIAN SYSTEMS', 256, 48);
      return new THREE.CanvasTexture(cv);
    }

    const brandMark = new THREE.Mesh(
      new THREE.PlaneGeometry(1.0, 0.2),
      new THREE.MeshBasicMaterial({ map: createBrandTexture(), transparent: true, depthWrite: false })
    );
    brandMark.position.set(0, -0.72, 1.004);
    product.add(brandMark);

    // ── Button ─────────────────────────────────
    const btnBase = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.05, 0.07, 24), darkMetalMat
    );
    btnBase.position.set(-0.6, 1.53, 0);
    product.add(btnBase);

    const button = new THREE.Mesh(
      new THREE.CylinderGeometry(0.065, 0.07, 0.06, 24), buttonMat
    );
    const BTN_Y = 1.57;
    button.position.set(-0.6, BTN_Y, 0);
    button.castShadow = true;
    product.add(button);

    // ── Base ───────────────────────────────────
    const base = new THREE.Mesh(
      new RoundedBoxGeometry(2.0, 0.08, 1.4, 4, 0.04),
      new THREE.MeshPhysicalMaterial({
        color: 0xb0b0b4, roughness: 0.2, metalness: 0.7, clearcoat: 0.3,
      })
    );
    base.position.set(0, -1.54, 0);
    base.castShadow = true;
    base.receiveShadow = true;
    product.add(base);

    // ── Lighting (clean, neutral studio) ───────
    const key = new THREE.DirectionalLight(0xffffff, 2.0);
    key.position.set(4, 5, 6);
    key.castShadow = true;
    key.shadow.mapSize.set(2048, 2048);
    key.shadow.camera.near = 0.1;
    key.shadow.camera.far = 20;
    key.shadow.camera.left = -4;
    key.shadow.camera.right = 4;
    key.shadow.camera.top = 4;
    key.shadow.camera.bottom = -4;
    key.shadow.radius = 4;
    key.shadow.bias = -0.0005;
    scene.add(key);

    scene.add(new THREE.DirectionalLight(0xe8eeff, 0.6).translateX(-4).translateY(3).translateZ(2));
    scene.add(new THREE.DirectionalLight(0xffffff, 0.8).translateY(2).translateZ(-5));
    scene.add(new THREE.HemisphereLight(0xf0f0f5, 0xd0d0d4, 0.5));
    scene.add(new THREE.AmbientLight(0xffffff, 0.3));

    // ── Ground ─────────────────────────────────
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 30),
      new THREE.MeshStandardMaterial({ color: 0xf0f0f2, roughness: 0.3, metalness: 0.0 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1.58;
    ground.receiveShadow = true;
    scene.add(ground);

    function createContactShadow() {
      const s = 256;
      const cv = document.createElement('canvas');
      cv.width = s; cv.height = s;
      const ctx = cv.getContext('2d');
      const g = ctx.createRadialGradient(s / 2, s / 2, 0, s / 2, s / 2, s / 2);
      g.addColorStop(0, 'rgba(0,0,0,0.15)');
      g.addColorStop(0.6, 'rgba(0,0,0,0.05)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, s, s);
      return new THREE.CanvasTexture(cv);
    }

    const contactShadow = new THREE.Mesh(
      new THREE.PlaneGeometry(3.5, 2.5),
      new THREE.MeshBasicMaterial({ map: createContactShadow(), transparent: true, depthWrite: false })
    );
    contactShadow.rotation.x = -Math.PI / 2;
    contactShadow.position.y = -1.575;
    scene.add(contactShadow);

    // ── Interactions ───────────────────────────
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    let targetColor = new THREE.Color(0xc8c8cc);

    let clockOn = true;
    let flashTime = 0;
    const FLASH_DURATION = 400;
    let targetClockEmissive = 0.2;
    let targetClockColor = new THREE.Color(1, 1, 1);
    let targetHandOpacity = 1.0;

    canvas.addEventListener('pointerdown', (e) => {
      pointer.x = (e.clientX / innerWidth) * 2 - 1;
      pointer.y = -(e.clientY / innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      if (raycaster.intersectObject(button).length) {
        button.position.y = BTN_Y - 0.03;
        setTimeout(() => { button.position.y = BTN_Y; }, 120);

        clockOn = !clockOn;
        flashTime = Date.now();
        targetClockEmissive = clockOn ? 0.2 : 0.0;
        targetClockColor.set(clockOn ? 1 : 0, clockOn ? 1 : 0, clockOn ? 1 : 0);
        targetHandOpacity = clockOn ? 1.0 : 0.0;
      }
    });

    canvas.addEventListener('pointermove', (e) => {
      pointer.x = (e.clientX / innerWidth) * 2 - 1;
      pointer.y = -(e.clientY / innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      canvas.style.cursor = raycaster.intersectObject(button).length ? 'pointer' : '';
    });

    document.querySelectorAll('.swatch').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        el.classList.add('active');
        targetColor.set(el.dataset.color);
      });
    });

    // ── Animation Loop ─────────────────────────
    function animate() {
      requestAnimationFrame(animate);

      if (clockOn) {
        const now = new Date();
        const s = now.getSeconds() + now.getMilliseconds() / 1000;
        const m = now.getMinutes() + s / 60;
        const h = (now.getHours() % 12) + m / 60;
        secondHand.rotation.z = -(s / 60) * Math.PI * 2;
        minuteHand.rotation.z = -(m / 60) * Math.PI * 2;
        hourHand.rotation.z = -(h / 12) * Math.PI * 2;
      }

      // Smooth transitions
      clockFaceMat.emissiveIntensity += (targetClockEmissive - clockFaceMat.emissiveIntensity) * 0.06;
      clockFaceMat.color.lerp(targetClockColor, 0.06);
      handMat.opacity += (targetHandOpacity - handMat.opacity) * 0.08;
      secondHandMat.opacity += (targetHandOpacity - secondHandMat.opacity) * 0.08;

      const handsVisible = handMat.opacity > 0.01;
      hourHand.visible = handsVisible;
      minuteHand.visible = handsVisible;
      secondHand.visible = handsVisible;
      cap.visible = handsVisible;

      powerLedMat.emissiveIntensity += ((clockOn ? 0.5 : 0.0) - powerLedMat.emissiveIntensity) * 0.06;

      // Brief flash on toggle
      const flashElapsed = Date.now() - flashTime;
      if (flashElapsed < FLASH_DURATION) {
        const t = flashElapsed / FLASH_DURATION;
        const pulse = Math.sin(t * Math.PI) * (1 - t * 0.4);
        clockFaceMat.emissiveIntensity += pulse * 0.3;
      }

      bodyMat.color.lerp(targetColor, 0.08);
      product.position.y = Math.sin(Date.now() * 0.0008) * 0.006;

      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
